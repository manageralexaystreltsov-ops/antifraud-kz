<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Вход — Личный кабинет — Антифрод Центр</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{primary:'#B80018',gold:'#C8A000',dark:'#1A1A1A',darker:'#000000'},fontFamily:{heading:['Oswald','sans-serif'],body:['PT Sans','sans-serif']}}}}</script>
<style>
body{background:#000;color:#fff;font-family:'PT Sans',sans-serif;padding-bottom:40px}
.wrap{max-width:600px;margin:0 auto;padding:20px 16px}
.login-box{background:#1A1A1A;border:1px solid rgba(255,255,255,.06);border-radius:20px;padding:32px;margin-bottom:20px}
.logo{text-align:center;margin-bottom:24px}
.logo-icon{width:56px;height:56px;background:linear-gradient(135deg,#B80018,#8B0012);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.logo h1{font-family:'Oswald',sans-serif;font-size:1.2rem;font-weight:700}
.logo p{color:#7a8ba3;font-size:.82rem}
.tabs{display:flex;gap:4px;margin-bottom:20px;background:rgba(255,255,255,.03);border-radius:10px;padding:4px}
.tab{flex:1;padding:10px;text-align:center;border-radius:8px;cursor:pointer;font-size:.82rem;font-weight:600;color:#7a8ba3;border:none;background:transparent;font-family:'PT Sans',sans-serif;transition:all .2s}
.tab.active{color:#fff;background:rgba(184,0,24,.15);border:1px solid rgba(184,0,24,.3)}
.form-input{width:100%;padding:14px 16px;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);border-radius:12px;font-size:1rem;color:#fff;font-family:'PT Sans',sans-serif;margin-bottom:12px}
.form-input::placeholder{color:#555}
.form-input:focus{border-color:rgba(184,0,24,.4);outline:none}
.form-label{display:block;font-size:.82rem;color:#7a8ba3;margin-bottom:6px}
.submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,#B80018,#8B0012);color:#fff;border:none;border-radius:12px;font-family:'Oswald',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;transition:all .2s}
.submit-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(184,0,24,.3)}
.error{color:#fca5a5;font-size:.82rem;margin-top:8px;display:none}
.hint{font-size:.72rem;color:#555;text-align:center;margin:8px 0}
.footer-link{text-align:center;margin-top:12px;font-size:.82rem;color:#7a8ba3}
.footer-link a{color:#B80018;text-decoration:none}
.client-list{max-height:400px;overflow-y:auto;border:1px solid rgba(255,255,255,.06);border-radius:12px;margin-top:16px}
.client-list::-webkit-scrollbar{width:6px}
.client-list::-webkit-scrollbar-track{background:rgba(255,255,255,.02)}
.client-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
.client-item{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .2s;font-size:.88rem}
.client-item:hover{background:rgba(255,255,255,.03)}
.client-item:last-child{border-bottom:none}
.client-name{font-weight:600;color:#fff}
.client-meta{font-size:.78rem;color:#7a8ba3}
.client-status{font-size:.72rem;padding:3px 8px;border-radius:100px;font-weight:600}
.s-done{background:rgba(16,185,129,.1);color:#6ee7b7}
.s-process{background:rgba(245,158,11,.1);color:#fbbf24}
.client-count{font-size:.78rem;color:#7a8ba3;text-align:center;padding:8px;border-bottom:1px solid rgba(255,255,255,.04)}
</style>
</head>
<body>
<div class="wrap" style="padding-top:40px">
    <div class="login-box">
        <div class="logo">
            <div class="logo-icon">
                <svg style="width:28px;height:28px;color:#fff" fill="currentColor" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
            </div>
            <h1>АНТИФРОД ЦЕНТР</h1>
            <p>Личный кабинет клиента</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('iin',this)">По ИИН</button>
            <button class="tab" onclick="switchTab('case',this)">По номеру дела</button>
            <button class="tab" onclick="switchTab('phone',this)">По телефону</button>
        </div>

        <div id="tab-iin">
            <label class="form-label">ИИН (12 цифр)</label>
            <input type="text" class="form-input" id="iinInput" placeholder="920515301456" maxlength="12" oninput="this.value=this.value.replace(/[^0-9]/g,'');filterClients()">
        </div>
        <div id="tab-case" style="display:none">
            <label class="form-label">Номер дела</label>
            <input type="text" class="form-input" id="caseInput" placeholder="AF-2026-0847" oninput="filterClients()">
        </div>
        <div id="tab-phone" style="display:none">
            <label class="form-label">Телефон</label>
            <input type="text" class="form-input" id="phoneInput" placeholder="+7 701 234 56 78" oninput="filterClients()">
        </div>

        <div id="loginError" class="error"></div>
        <button class="submit-btn" onclick="findCase()">НАЙТИ МОЁ ДЕЛО →</button>
        <div class="footer-link">Нет номера дела? <a href="/antifraud-kz/quiz.html">Оставьте заявку</a> или позвоните: <strong style="color:#C8A000">1434</strong></div>
    </div>

    <!-- Список клиентов -->
    <div class="client-list" id="clientList">
        <div id="clientItems"></div>
    </div>
</div>

<script>
var currentTab='iin';
var allClients=[];

(function(){
    var adminClients=JSON.parse(localStorage.getItem('admin_clients')||'[]');
    adminClients.forEach(function(c){
        allClients.push({id:c.id,name:c.name,city:c.city||'',status:c.status||'new',amount:c.amount||'',iin:c.iin||'',phone:c.phone||'',_admin:true});
    });
    renderClients(allClients);
})();

function renderClients(list){
    var html='';
    var adminList=list.filter(function(c){return c._admin});
    var fakeList=list.filter(function(c){return !c._admin});
    if(adminList.length){
        html+='<div style="padding:10px 16px;font-size:.78rem;color:#C8A000;font-weight:700;border-bottom:1px solid rgba(200,160,0,.2);background:rgba(200,160,0,.05)">ВАШИ РЕАЛЬНЫЕ КЛИЕНТЫ ('+adminList.length+')</div>';
        adminList.forEach(function(c){
            var sc=c.status==='done'?'s-done':'s-process';
            var sl=c.status==='done'?'Завершено':'В работе';
            html+='<div class="client-item" style="background:rgba(200,160,0,.04)" onclick="loginAs(\''+c.iin+'\')">';
            html+='<div><div class="client-name">'+c.name+'</div><div class="client-meta">'+c.id+' · '+(c.city||'')+' · '+c.amount+'</div></div>';
            html+='<span class="client-status '+sc+'">'+sl+'</span>';
            html+='</div>';
        });
    }
    document.getElementById('clientItems').innerHTML=html;
}

function filterClients(){
    var q='';
    if(currentTab==='iin')q=document.getElementById('iinInput').value.trim().toLowerCase();
    else if(currentTab==='case')q=document.getElementById('caseInput').value.trim().toLowerCase();
    else q=document.getElementById('phoneInput').value.trim().toLowerCase();
    if(!q){renderClients(allClients);return}
    var filtered=allClients.filter(function(c){
        return c.iin.indexOf(q)>=0||c.id.toLowerCase().indexOf(q)>=0||c.phone.indexOf(q)>=0||c.name.toLowerCase().indexOf(q)>=0;
    });
    renderClients(filtered);
}

function switchTab(tab,btn){
    currentTab=tab;
    document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
    btn.classList.add('active');
    document.getElementById('tab-iin').style.display=tab==='iin'?'block':'none';
    document.getElementById('tab-case').style.display=tab==='case'?'block':'none';
    document.getElementById('tab-phone').style.display=tab==='phone'?'block':'none';
    filterClients();
}

function loginAs(iin){
    var c=allClients.find(function(x){return x.iin===iin&&(x._admin||true)});
    if(c){
        localStorage.setItem('currentCase',JSON.stringify({id:c.id,name:c.name,phone:c.phone}));
        window.location.href='/antifraud-kz/client/dashboard.html?id='+c.id;
    }
}

function findCase(){
    var key='';
    if(currentTab==='iin')key=document.getElementById('iinInput').value.trim();
    else if(currentTab==='case')key=document.getElementById('caseInput').value.trim().toUpperCase();
    else key=document.getElementById('phoneInput').value.trim();
    if(!key){document.getElementById('loginError').textContent='Введите данные';document.getElementById('loginError').style.display='block';return}
    var found=allClients.find(function(c){return c._admin&&(c.iin===key||c.id===key||c.phone===key)});
    if(!found) found=allClients.find(function(c){return c.iin===key||c.id===key||c.phone===key});
    if(!found){
        document.getElementById('loginError').textContent='Дело не найдено. Проверьте данные или оставьте заявку.';
        document.getElementById('loginError').style.display='block';
        return;
    }
    localStorage.setItem('currentCase',JSON.stringify({id:found.id,name:found.name,phone:found.phone}));
    window.location.href='/antifraud-kz/client/dashboard.html?id='+found.id;
}
</script>
<script src="/antifraud-kz/assets/js/nav.js"></script>
</body>
</html>
