<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Личный кабинет — Антифрод Центр</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{primary:'#B80018',gold:'#C8A000',dark:'#1A1A1A',darker:'#000000'},fontFamily:{heading:['Oswald','sans-serif'],body:['PT Sans','sans-serif']}}}}</script>
<style>
body{background:#0a0a0a;color:#fff;font-family:'PT Sans',sans-serif;padding-bottom:40px}
.login-wrap{max-width:700px;margin:0 auto;padding:20px 16px;padding-top:100px}
.hero-section{text-align:center;padding:40px 20px 20px;position:relative}
.hero-section h1{font-size:clamp(1.8rem,5vw,2.8rem);font-weight:700;margin-bottom:8px;background:linear-gradient(135deg,#fff,#C8A000);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-section p{color:#7a8ba3;font-size:1rem;max-width:500px;margin:0 auto}
.search-box{position:relative;margin:28px 0 16px}
.search-input{width:100%;padding:18px 20px 18px 52px;background:rgba(26,26,26,.8);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:2px solid rgba(255,255,255,.08);border-radius:16px;color:#fff;font-size:1.05rem;font-family:'PT Sans',sans-serif;transition:all .3s}
.search-input:focus{outline:none;border-color:rgba(184,0,24,.5);box-shadow:0 0 0 4px rgba(184,0,24,.1),0 8px 32px rgba(0,0,0,.3)}
.search-input::placeholder{color:#555}
.search-icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:#7a8ba3;font-size:1.2rem;pointer-events:none}
.search-count{font-size:.78rem;color:#7a8ba3;text-align:center;margin-bottom:12px;transition:opacity .3s}
.client-list{display:flex;flex-direction:column;gap:6px;max-height:60vh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(184,0,24,.3) transparent}
.client-list::-webkit-scrollbar{width:6px}
.client-list::-webkit-scrollbar-track{background:transparent}
.client-list::-webkit-scrollbar-thumb{background:rgba(184,0,24,.3);border-radius:3px}
.client-card{background:rgba(26,26,26,.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px 18px;cursor:pointer;transition:all .35s cubic-bezier(0.16,1,0.3,1);opacity:0;transform:translateY(12px);animation:cardIn .4s cubic-bezier(0.16,1,0.3,1) forwards}
.client-card:hover{border-color:rgba(184,0,24,.3);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.3);background:rgba(30,30,30,.8)}
.client-card:active{transform:scale(.98)}
.client-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.client-name{font-weight:700;font-size:1rem}
.client-badge{font-size:.7rem;padding:3px 10px;border-radius:100px;font-weight:700}
.badge-new{background:rgba(99,102,241,.12);color:#818cf8;border:1px solid rgba(99,102,241,.2)}
.badge-process{background:rgba(245,158,11,.1);color:#fbbf24;border:1px solid rgba(245,158,11,.2)}
.badge-done{background:rgba(16,185,129,.1);color:#6ee7b7;border:1px solid rgba(16,185,129,.2)}
.client-meta{display:flex;gap:12px;font-size:.82rem;color:#7a8ba3;flex-wrap:wrap}
.client-meta span{display:flex;align-items:center;gap:4px}
.client-meta .amount{color:#C8A000;font-weight:600}
.empty-state{text-align:center;padding:60px 20px;color:#555}
.empty-state .icon{font-size:3rem;margin-bottom:12px;opacity:.5}
@keyframes cardIn{to{opacity:1;transform:translateY(0)}}
.footer-link{text-align:center;margin-top:24px;font-size:.85rem;color:#7a8ba3}
.footer-link a{color:#B80018;text-decoration:none;font-weight:600}
</style>
</head>
<body>

<div class="login-wrap">
    <div class="hero-section">
        <h1>АНТИФРОД ЦЕНТР</h1>
        <p>Личный кабинет клиента</p>
    </div>

    <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="searchInput" placeholder="Введите ИИН, номер дела, телефон или ФИО..." oninput="filterClients()" autofocus>
    </div>
    <div class="search-count" id="searchCount"></div>

    <div class="client-list" id="clientList"></div>

    <div class="footer-link">
        Нет номера дела? <a href="/antifraud-kz/quiz.html">Оставьте заявку</a>
    </div>
</div>

<script>
var allClients=[];

var _S=1;
function _R(){_S=(_S*16807)%2147483647;return(_S-1)/2147483646;}
function _P(a){return a[Math.floor(_R()*a.length)];}
function _N(a,b){return Math.floor(_R()*(b-a+1))+a;}

var FN=['Абай','Мария','Даулет','Асель','Серик','Гулнара','Руслан','Динара','Ербол','Жанна','Нурлан','Айгуль','Тимур','Айжан','Бауыржан','Гульмира','Данияр','Ержан','Камила','Лаура','Мадина','Нуржан','Олег','Ринат','Сауле','Талгат','Улжан','Фарид','Халида','Азамат','Ботир','Гаухар','Дархан','Елена','Жанат','Игорь','Кристина','Лев','Оксана','Пётр','Роман','Светлана','Татьяна','Улан','Фёдор','Хасен','Шерзод','Эдуард','Юрий','Ярослав','Алмаз','Булат','Виктор','Григорий','Дмитрий','Евгений','Ильяс','Канат','Марат','Олжас','Павел','Рустам','Сергей','Тимофей','Филипп','Хамит','Эрлан','Андрей','Борис','Валерий','Геннадий','Денис','Иван','Константин','Михаил','Николай','Анна','Виктория','Екатерина','Зинаида','Ирина','Клара','Людмила','Наталья','Ольга','Раиса','Тамара','Ульяна','Фаина','Хорлан','Эльвира','Юлия','Яна','Айдар','Бекзат','Генрих','Дания'];
var LN=['Кажибаев','Серикова','Нурланов','Маратова','Алибеков','Жумабаева','Ахметов','Касымова','Байжанов','Иманова','Турсунов','Абдрахманова','Сагинов','Калиева','Оразов','Муканова','Есентаев','Бектуров','Садыкова','Шарипов','Кенжебаев','Мамырова','Токтосунов','Жаксылыкова','Берденов','Назарова','Сулеев','Курманова','Алпысов','Жолдыбаев','Шынкеев','Тлеубаев','Мусин','Кудайбергенов','Рысбеков','Бакиров','Копбаев','Сатыбалдиев','Искаков','Токбергенов','Молдагалиев','Кенесов','Абылкасымов','Бижанов','Досмурзаев','Жолдасбеков','Касенов','Нургалиев','Рахимжанов','Сарсенбаев'];
var CI=['Алматы','Астана','Шымкент','Атырау','Караганда','Актобе','Павлодар','Усть-Каменогорск','Семей','Петропавловск','Костанай','Кызылорда','Тараз','Туркестан','Актау','Экибастуз','Рудный','Темиртау','Жезказган','Балхаш','Кокшетау','Талдыкорган','Жамбыл','Мангистау'];
var ST=['done','process','done','done','process','done','done','new'];
var AM=['150 000 ₸','320 000 ₸','500 000 ₸','780 000 ₸','1 200 000 ₸','1 800 000 ₸','2 500 000 ₸','3 100 000 ₸','4 500 000 ₸','6 200 000 ₸','890 000 ₸','1 500 000 ₸','5 800 000 ₸','7 300 000 ₸','2 100 000 ₸'];
var PL=['FinHub Invest','InvestPro Capital','TradePro KZ','Atlas Broker','Binomo клон','IQ Option клон','PrimeFX Markets','GlobalTrade FX','CryptoGain KZ','CryptoMax KZ','HashFlow KZ','SmartTrade Invest','WealthPro KZ','AlphaTrade KZ'];

function genPhone(){
    var codes=['700','701','702','705','706','707','708','709','747','771','775','776','777','778'];
    var c=_P(codes);
    var p1=String(_N(100,999));
    var p2=String(_N(10,99));
    var p3=String(_N(10,99));
    return '+7 '+c+' '+p1+' '+p2+' '+p3;
}

function genIIN(){
    var y=_N(1955,2005);
    var m=String(_N(1,12)).padStart(2,'0');
    var d=String(_N(1,28)).padStart(2,'0');
    var s=_N(1,32);
    var sn=String(_N(1,999999)).padStart(6,'0');
    var first=y*10000+parseInt(m)*100+parseInt(d);
    var base=String(first)+String(s).padStart(2,'0')+sn;
    return base.substring(0,12);
}

(function(){
    var adminClients=JSON.parse(localStorage.getItem('admin_clients')||'[]');
    var fakeClients=[];
    for(var i=0;i<600;i++){
        var num=String(i+1).padStart(4,'0');
        fakeClients.push({
            id:'AF-2026-'+num,
            name:_P(FN)+' '+_P(LN),
            city:_P(CI),
            status:_P(ST),
            amount:_P(AM),
            iin:genIIN(),
            phone:genPhone()
        });
    }
    adminClients.forEach(function(c){
        fakeClients.push({id:c.id,name:c.name,city:c.city||'',status:c.status||'new',amount:c.amount||'',iin:c.iin||'',phone:c.phone||'',_admin:true});
    });
    var realCount=adminClients.length;
    var insertAt=Math.floor(fakeClients.length/2);
    var realItems=fakeClients.splice(insertAt);
    allClients=fakeClients.concat(realItems);
    renderClients(allClients);
})();

function renderClients(list){
    var total=allClients.length;
    var shown=list.length;
    var q=document.getElementById('searchInput').value.trim();
    document.getElementById('searchCount').textContent=q?'Найдено: '+shown:'';
    document.getElementById('searchCount').style.display=q?'block':'none';
    var h='';
    if(!list.length){
        h='<div class="empty-state"><div class="icon">📭</div><div>Клиенты не найдены</div></div>';
    }else{
        list.forEach(function(c,i){
            var sc=c.status==='done'?'badge-done':c.status==='process'?'badge-process':'badge-new';
            var sl=c.status==='done'?'Завершено':c.status==='process'?'В работе':'Новый';
            var style=c._admin?'border-color:rgba(200,160,0,.2);background:rgba(200,160,0,.03)':'';
            h+='<div class="client-card" style="animation-delay:'+Math.min(i*20,400)+'ms;'+style+'" onclick="openClient(\''+c.id+'\')">';
            h+='<div class="client-top"><div class="client-name">'+c.name+'</div><span class="client-badge '+sc+'">'+sl+'</span></div>';
            h+='<div class="client-meta">';
            h+='<span>'+c.id+'</span>';
            if(c.city)h+='<span>📍 '+c.city+'</span>';
            if(c.amount)h+='<span class="amount">'+c.amount+'</span>';
            if(c.phone)h+='<span>📱 '+c.phone+'</span>';
            h+='</div></div>';
        });
    }
    document.getElementById('clientList').innerHTML=h;
}

function filterClients(){
    var q=document.getElementById('searchInput').value.trim().toLowerCase();
    if(!q){renderClients(allClients);return}
    var filtered=allClients.filter(function(c){
        return (c.iin&&c.iin.indexOf(q)>=0)||(c.id&&c.id.toLowerCase().indexOf(q)>=0)||(c.phone&&c.phone.indexOf(q)>=0)||(c.name&&c.name.toLowerCase().indexOf(q)>=0);
    });
    renderClients(filtered);
}

function openClient(id){
    var c=allClients.find(function(x){return x.id===id});
    if(c){
        localStorage.setItem('currentCase',JSON.stringify({id:c.id,name:c.name,phone:c.phone}));
        window.location.href='/antifraud-kz/client/dashboard.html?id='+c.id;
    }
}

document.getElementById('searchInput').addEventListener('keydown',function(e){
    if(e.key==='Enter'){
        var q=this.value.trim().toLowerCase();
        if(!q)return;
        var found=allClients.find(function(c){
            return (c.iin&&c.iin===q)||(c.id&&c.id.toLowerCase()===q)||(c.phone&&c.phone===q);
        });
        if(found)openClient(found.id);
    }
});
</script>
<script src="/antifraud-kz/assets/js/nav.js"></script>
</body>
</html>
