<style>
body{background:#000;padding-bottom:70px}
.qz{max-width:640px;margin:0 auto;padding:clamp(24px,5vw,48px) clamp(16px,4vw,20px)}
.qz h1{font-size:clamp(1.5rem,4vw,2rem);font-weight:900;margin-bottom:8px;text-align:center}
.qz>p{color:#7a8ba3;text-align:center;margin-bottom:32px;font-size:.92rem}
.qz-progress{margin-bottom:32px}
.qz-bar{height:4px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;margin-bottom:8px}
.qz-bar-fill{height:100%;background:linear-gradient(90deg,#B80018,#C8A000);border-radius:4px;transition:width .5s}
.qz-bar-text{font-size:.72rem;color:#7a8ba3;text-align:center}
.qz-card{background:rgba(26,26,26,.95);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:clamp(20px,4vw,32px);margin-bottom:16px}
.qz-q{font-size:1.1rem;font-weight:800;color:#fff;margin-bottom:20px;line-height:1.4}
.qz-options{display:grid;gap:10px}
.qz-opt{padding:14px 18px;background:rgba(255,255,255,.02);border:1.5px solid rgba(255,255,255,.08);border-radius:12px;cursor:pointer;transition:all .3s;font-size:.88rem;color:#e8ecf4;text-align:left;font-family:'PT Sans',sans-serif;width:100%}
.qz-opt:hover{border-color:rgba(184,0,24,.25);background:rgba(184,0,24,.04);color:#fff}
.qz-opt.selected{border-color:#B80018;background:rgba(184,0,24,.08);color:#fff}
.qz-input{width:100%;padding:14px 18px;background:rgba(255,255,255,.03);border:1.5px solid rgba(255,255,255,.08);border-radius:12px;font-size:.95rem;font-family:'PT Sans',sans-serif;color:#fff;transition:all .3s;margin-bottom:12px}
.qz-input::placeholder{color:#7a8ba3}
.qz-input:focus{border-color:rgba(184,0,24,.4);outline:none}
.qz-input.error{border-color:rgba(239,68,68,.5)}
.qz-label{font-size:.82rem;color:#7a8ba3;margin-bottom:6px;display:block}
.qz-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.qz-result{display:none}
.qz-result.show{display:block}
.qz-result-card{background:rgba(26,26,26,.95);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:clamp(24px,5vw,36px);text-align:center}
.qz-stage-icon{font-size:4rem;margin-bottom:12px}
.qz-stage-badge{display:inline-block;padding:6px 16px;border-radius:100px;font-size:.82rem;font-weight:700;margin-bottom:16px}
.qz-stage-title{font-size:1.3rem;font-weight:800;color:#fff;margin-bottom:8px}
.qz-stage-desc{color:#e8ecf4;font-size:.92rem;line-height:1.7;margin-bottom:20px}
.qz-stage-hope{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:12px;padding:16px;margin-bottom:20px;text-align:left}
.qz-stage-hope-title{color:#6ee7b7;font-weight:700;font-size:.9rem;margin-bottom:6px}
.qz-stage-hope-text{color:#e8ecf4;font-size:.85rem;line-height:1.6}
.qz-summary{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px;margin-bottom:20px;text-align:left}
.qz-summary-title{font-weight:700;color:#fff;margin-bottom:8px;font-size:.9rem}
.qz-summary-item{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:.82rem}
.qz-summary-item:last-child{border-bottom:none}
.qz-summary-label{color:#7a8ba3}
.qz-summary-value{color:#fff;font-weight:600}
.qz-steps{display:grid;gap:10px;text-align:left;margin-bottom:24px}
.qz-step{display:flex;gap:12px;padding:12px 14px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);border-radius:10px}
.qz-step-num{width:28px;height:28px;background:linear-gradient(135deg,#B80018,#C8A000);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.75rem;color:#fff;flex-shrink:0}
.qz-step-text{font-size:.85rem;color:#e8ecf4;flex:1}

.qz-btn{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;background:linear-gradient(135deg,#B80018,#C8A000);color:#fff;border-radius:12px;font-weight:700;font-size:.95rem;text-decoration:none;transition:all .3s;box-shadow:0 4px 20px rgba(184,0,24,.25);border:none;cursor:pointer;font-family:'PT Sans',sans-serif}
.qz-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(184,0,24,.35)}
.qz-btn:disabled{opacity:.4;cursor:not-allowed}
.qz-btn-full{width:100%}
.qz-next{width:100%;margin-top:16px}
.qz-back{background:transparent;border:1px solid rgba(255,255,255,.1);color:#7a8ba3;padding:10px 20px;border-radius:10px;cursor:pointer;font-size:.85rem;margin-top:12px;font-family:'PT Sans',sans-serif}
.qz-back:hover{color:#fff;border-color:rgba(255,255,255,.2)}
.qz-contact-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
.qz-contact-btn{display:flex;align-items:center;justify-content:center;gap:10px;padding:16px;border-radius:12px;font-weight:700;text-decoration:none;transition:all .3s;font-size:.95rem}
.qz-wa{background:#25D366;color:#fff}
.qz-wa:hover{background:#128C7E;transform:translateY(-2px)}
.qz-tg{background:#0088cc;color:#fff}
.qz-tg:hover{background:#006daa;transform:translateY(-2px)}
.qz-restart{margin-top:12px;font-size:.82rem;color:#7a8ba3;cursor:pointer;transition:color .2s}
.qz-restart:hover{color:#fff}
@media(max-width:480px){.qz-row{grid-template-columns:1fr}}
</style>

                        WhatsApp
                    </a>
                    <a href="https://t.me/antifraud_kz" target="_blank" class="qz-contact-btn qz-tg">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.479.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
                        Telegram

    <!-- Result after sending -->

<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
<script>
var data={fio:'',phone:'',phone2:'',messenger:'',fraudType:'',platform:'',amount:'',timeFrame:'',blocked:'',reported:'',evidence:'',details:''};
var selectedOpts={};

function selectOption(groupId,val){
    var group=document.getElementById(groupId);
    group.querySelectorAll('.qz-opt').forEach(function(b){b.classList.remove('selected')});
    event.target.classList.add('selected');
    data[groupId==='fraudType'?'fraudType':groupId==='timeFrame'?'timeFrame':groupId==='blocked'?'blocked':groupId==='reported'?'reported':'evidence']=val;
    selectedOpts[groupId]=val;
}

function goStep(n){
    if(n===2){
        if(!document.getElementById('fio').value.trim()){document.getElementById('fio').classList.add('error');return}
        if(!document.getElementById('phone').value.trim()){document.getElementById('phone').classList.add('error');return}
        data.fio=document.getElementById('fio').value.trim();
        data.phone=document.getElementById('phone').value.trim();
        data.phone2=document.getElementById('phone2').value.trim();
        data.messenger=document.getElementById('messenger').value.trim();
    }
    if(n===3){
        if(!data.fraudType){alert('Выберите тип мошенничества');return}
        if(!document.getElementById('amount').value.trim()){document.getElementById('amount').classList.add('error');return}
        if(!data.timeFrame){alert('Выберите когда перевели');return}
        data.platform=document.getElementById('platform').value.trim();
        data.amount=document.getElementById('amount').value.trim();
    }
    if(n===4){
        if(!data.blocked){alert('Выберите заблокировали ли карту');return}
        if(!data.reported){alert('Выберите куда обращались');return}
        if(!data.evidence){alert('Выберите есть ли доказательства');return}
        data.details=document.getElementById('details').value.trim();
        renderSummary();
    }
    document.querySelectorAll('.qz-card').forEach(function(c){c.style.display='none'});
    document.getElementById('step'+n).style.display='block';
    var pct=((n-1)/3)*100;
    document.getElementById('qz-bar').style.width=pct+'%';
    document.getElementById('qz-bar-text').textContent='Шаг '+n+' из 4';
    window.scrollTo({top:0,behavior:'smooth'});
}

function renderSummary(){
    var typeNames={invest:'Инвестиции',crypto:'Крипто',forex:'Forex/опционы',mfo:'Микрозайм/банк',other:'Другое'};
    var timeNames={week:'1-7 дней',month:'1-4 недели',old:'более месяца','24h':'менее 24ч'};
    var blockNames={no:'Нет',late:'Да, поздно',early:'Да, вовремя',partial:'Частично'};
    var reportNames={none:'Нигде',bank:'В банк',police:'В полицию',arrfr:'В АРРФР',all:'Во все инстанции'};
    var evidenceNames={no:'Нет',partial:'Частично',full:'Да, всё',ready:'Готов предоставить'};
    var h='<div class="qz-summary-title">📋 Ваши данные:</div>';
    h+='<div class="qz-summary-item"><span class="qz-summary-label">ФИО</span><span class="qz-summary-value">'+data.fio+'</span></div>';
    h+='<div class="qz-summary-item"><span class="qz-summary-label">Телефон</span><span class="qz-summary-value">'+data.phone+'</span></div>';
    if(data.phone2)h+='<div class="qz-summary-item"><span class="qz-summary-label">Запасной</span><span class="qz-summary-value">'+data.phone2+'</span></div>';
    if(data.messenger)h+='<div class="qz-summary-item"><span class="qz-summary-label">Мессенджер</span><span class="qz-summary-value">'+data.messenger+'</span></div>';
    h+='<div class="qz-summary-item"><span class="qz-summary-label">Тип мошенничества</span><span class="qz-summary-value">'+typeNames[data.fraudType]+'</span></div>';
    if(data.platform)h+='<div class="qz-summary-item"><span class="qz-summary-label">Платформа</span><span class="qz-summary-value">'+data.platform+'</span></div>';
    h+='<div class="qz-summary-item"><span class="qz-summary-label">Сумма потерь</span><span class="qz-summary-value">'+data.amount+' ₸</span></div>';
    h+='<div class="qz-summary-item"><span class="qz-summary-label">Последний платёж</span><span class="qz-summary-value">'+timeNames[data.timeFrame]+'</span></div>';
    h+='<div class="qz-summary-item"><span class="qz-summary-label">Карта заблокирована</span><span class="qz-summary-value">'+blockNames[data.blocked]+'</span></div>';
    h+='<div class="qz-summary-item"><span class="qz-summary-label">Обращения</span><span class="qz-summary-value">'+reportNames[data.reported]+'</span></div>';
    h+='<div class="qz-summary-item"><span class="qz-summary-label">Доказательства</span><span class="qz-summary-value">'+evidenceNames[data.evidence]+'</span></div>';
    if(data.details)h+='<div class="qz-summary-item"><span class="qz-summary-label">Детали</span><span class="qz-summary-value" style="max-width:60%;text-align:right">'+data.details+'</span></div>';
    document.getElementById('summary').innerHTML=h;
}

function sendApplication(){
    document.getElementById('sendBtns').style.display='none';
    document.getElementById('sending').style.display='block';
    data.timestamp=new Date().toISOString();
    var apps=JSON.parse(localStorage.getItem('applications')||'[]');
    apps.push(data);
    localStorage.setItem('applications',JSON.stringify(apps));
    setTimeout(function(){
        document.getElementById('sending').style.display='none';
        document.getElementById('sentMsg').style.display='block';
        showResult(data);
    },1500);
}

function showResult(d){
    var totalScore=0;
    if(d.timeFrame==='24h')totalScore+=4;
    else if(d.timeFrame==='week')totalScore+=3;
    else if(d.timeFrame==='month')totalScore+=2;
    else totalScore+=1;
    if(d.blocked==='no')totalScore+=4;
    else if(d.blocked==='late')totalScore+=3;
    else if(d.blocked==='partial')totalScore+=2;
    else totalScore+=1;
    if(d.reported==='none')totalScore+=4;
    else if(d.reported==='bank')totalScore+=3;
    else if(d.reported==='police'||d.reported==='arrfr')totalScore+=2;
    else totalScore+=1;
    if(d.evidence==='no')totalScore+=4;
    else if(d.evidence==='partial')totalScore+=3;
    else if(d.evidence==='full')totalScore+=2;
    else totalScore+=1;
    var avg=totalScore/4;
    var stage,icon,title,desc,hope,steps;
    if(avg>=3.2){
        stage='critical';icon='🚨';title='Ситуация требует немедленного реагирования';
        desc='Мошенники активно работают. Каждый день промедления снижает шансы на возврат.';
        hope='Данные показывают: при обращении в первые 72 часа шансы на возврат составляют до 78%. Вы ещё можете успеть!';

            {n:'1',t:'<strong>НЕ ПЕРЕВОДИТЕ больше денег</strong> — это повторное мошенничество'},
            {n:'2',t:'<strong>Заблокируйте карту</strong> немедленно'},
            {n:'3',t:'<strong>Сохраните ВСЁ</strong> — скриншоты, чеки, выписки'},
            {n:'4',t:'<strong>Свяжитесь с нами</strong> — мы начнём работу немедленно'}
        ];
    }else if(avg>=2.2){
        stage='active';icon='⚠️';title='Есть время для грамотных действий';
        desc='Ситуация серьёзная, но可控. У вас есть возможность вернуть средства.';
        hope='У вас уже есть доказательства и вы начали действовать. Шансы на возврат высоки.';

            {n:'1',t:'<strong>Зафиксируйте доказательства</strong>'},

            {n:'3',t:'<strong>Подайте заявление</strong> в АРРФР и полицию'},
            {n:'4',t:'<strong>Проконсультируйтесь</strong> с нами'}
        ];
    }else{
        stage='process';icon='📋';title='Процесс идёт правильно';
        desc='Вы уже сделали правильные шаги. Продолжайте и мы поможем довести до результата.';
        hope='Вы прошли самое сложное. При правильном сопровождении шансы очень высоки.';
        steps=[
            {n:'1',t:'<strong>Проверьте статус заявлений</strong>'},
            {n:'2',t:'<strong>Контролируйте банк</strong>'},
            {n:'3',t:'<strong>Подготовьте документы</strong> для суда'},
            {n:'4',t:'<strong>Обратитесь к нам</strong> для сопровождения'}
        ];
    }
    var h='<div class="qz-result-card">';
    h+='<div class="qz-stage-icon">'+icon+'</div>';

    h+='<div class="qz-stage-desc">'+desc+'</div>';

    h+='<a href="https://t.me/antifraud_kz" target="_blank" class="qz-contact-btn qz-tg"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.479.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>Telegram</a>';
    h+='</div>';
    h+='<div class="qz-restart" onclick="location.reload()">Заполнить заново</div>';
    h+='</div>';
    var resultDiv=document.getElementById('qz-result');
    resultDiv.innerHTML=h;
    resultDiv.classList.add('show');
    setTimeout(function(){resultDiv.scrollIntoView({behavior:'smooth',block:'start'})},100);
}

document.querySelectorAll('.qz-options').forEach(function(group){
    group.querySelectorAll('.qz-opt').forEach(function(btn){
        btn.addEventListener('click',function(){
            group.querySelectorAll('.qz-opt').forEach(function(b){b.classList.remove('selected')});
            btn.classList.add('selected');
            var id=group.id;
            var key=id==='fraudType'?'fraudType':id==='timeFrame'?'timeFrame':id==='blocked'?'blocked':id==='reported'?'reported':'evidence';
            data[key]=btn.getAttribute('data-val');
        });
    });
});

});
