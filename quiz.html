<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Определи свою стадию — Антифрод Центр Казахстан</title>
<meta name="description" content="Ответьте на вопросы и получите план действий по возврату средств">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{primary:'#B80018',gold:'#C8A000',dark:'#1A1A1A',darker:'#000000'},fontFamily:{heading:['Oswald','sans-serif'],body:['PT Sans','sans-serif']}}}}</script>
<link rel="stylesheet" href="/antifraud-kz/assets/css/styles.css">
<style>
body{background:#000;padding-bottom:70px}
.qz{max-width:640px;margin:0 auto;padding:clamp(24px,5vw,48px) clamp(16px,4vw,20px)}
.qz h1{font-size:clamp(1.5rem,4vw,2rem);font-weight:900;margin-bottom:8px;text-align:center}
.qz>p{color:#7a8ba3;text-align:center;margin-bottom:32px;font-size:.92rem}
.qz-progress{margin-bottom:32px}
.qz-bar{height:4px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;margin-bottom:8px}
.qz-bar-fill{height:100%;background:linear-gradient(90deg,#B80018,#C8A000);border-radius:4px;transition:width .5s}
.qz-bar-text{font-size:.72rem;color:#7a8ba3;text-align:center}
.qz-card{background:rgba(26,26,26,.95);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:clamp(20px,4vw,32px)}
.qz-q{font-size:1.1rem;font-weight:800;color:#fff;margin-bottom:24px;line-height:1.4}
.qz-options{display:grid;gap:10px}
.qz-opt{padding:14px 18px;background:rgba(255,255,255,.02);border:1.5px solid rgba(255,255,255,.08);border-radius:12px;cursor:pointer;transition:all .3s;font-size:.88rem;color:#e8ecf4;text-align:left;font-family:'PT Sans',sans-serif;width:100%}
.qz-opt:hover{border-color:rgba(184,0,24,.25);background:rgba(184,0,24,.04);color:#fff}
.qz-opt.selected{border-color:#B80018;background:rgba(184,0,24,.08);color:#fff}
.qz-result{display:none}
.qz-result.show{display:block}
.qz-result-card{background:rgba(26,26,26,.95);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:clamp(24px,5vw,36px);text-align:center}
.qz-stage-icon{font-size:4rem;margin-bottom:12px}
.qz-stage-badge{display:inline-block;padding:6px 16px;border-radius:100px;font-size:.82rem;font-weight:700;margin-bottom:16px}
.stage-a .qz-stage-badge{background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.2)}
.stage-b .qz-stage-badge{background:rgba(245,158,11,.1);color:#fbbf24;border:1px solid rgba(245,158,11,.2)}
.stage-c .qz-stage-badge{background:rgba(99,102,241,.1);color:#818cf8;border:1px solid rgba(99,102,241,.2)}
.qz-stage-title{font-size:1.3rem;font-weight:800;color:#fff;margin-bottom:8px}
.qz-stage-desc{color:#e8ecf4;font-size:.92rem;line-height:1.7;margin-bottom:20px;max-width:500px;margin-left:auto;margin-right:auto}
.qz-stage-hope{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:12px;padding:16px;margin-bottom:20px;text-align:left}
.qz-stage-hope-title{color:#6ee7b7;font-weight:700;font-size:.9rem;margin-bottom:6px}
.qz-stage-hope-text{color:#e8ecf4;font-size:.85rem;line-height:1.6}
.qz-summary{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px;margin-bottom:20px;text-align:left}
.qz-summary-title{font-weight:700;color:#fff;margin-bottom:8px;font-size:.9rem}
.qz-summary-item{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:.82rem}
.qz-summary-item:last-child{border-bottom:none}
.qz-summary-label{color:#7a8ba3}
.qz-summary-value{color:#fff;font-weight:600}
.qz-steps{display:grid;gap:10px;text-align:left;margin-bottom:24px}
.qz-step{display:flex;gap:12px;padding:12px 14px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);border-radius:10px}
.qz-step-num{width:28px;height:28px;background:linear-gradient(135deg,#B80018,#C8A000);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.75rem;color:#fff;flex-shrink:0}
.qz-step-text{font-size:.85rem;color:#e8ecf4;flex:1}
.qz-step-text strong{color:#fff}
.qz-result-btn{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;background:linear-gradient(135deg,#B80018,#C8A000);color:#fff;border-radius:12px;font-weight:700;font-size:.95rem;text-decoration:none;transition:all .3s;box-shadow:0 4px 20px rgba(184,0,24,.25)}
.qz-result-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(184,0,24,.35);color:#fff;text-decoration:none}
.qz-restart{margin-top:12px;font-size:.82rem;color:#7a8ba3;cursor:pointer;transition:color .2s}
.qz-restart:hover{color:#fff}
</style>
</head>
<body class="bg-darker text-white font-body">
<div class="qz pt-24">
    <h1 class="font-heading">🎯 Диагностика ситуации</h1>
    <p>Ответьте на 8 вопросов — получите точный план действий и оценку шансов</p>
    <div class="qz-progress">
        <div class="qz-bar"><div class="qz-bar-fill" id="qz-bar" style="width:0%"></div></div>
        <div class="qz-bar-text" id="qz-bar-text">Вопрос 1 из 8</div>
    </div>
    <div class="qz-card" id="qz-card"><div class="qz-q" id="qz-q"></div><div class="qz-options" id="qz-options"></div></div>
    <div class="qz-result" id="qz-result"></div>
</div>
<script>
var questions=[
    {q:'Как вас обманули? Выберите тип мошенничества:',opts:[
        {text:'Инвестиционная платформа (обещали доходность)',score:4,cat:'invest'},
        {text:'Криптобиржа / DeFi / майнинг',score:4,cat:'crypto'},
        {text:'Forex / бинарные опционы',score:4,cat:'forex'},
        {text:'Микрозайм / банк (навязали услугу)',score:3,cat:'mfo'}
    ]},
    {q:'Какая сумма ваших потерь?',opts:[
        {text:'До 500 000 ₸',score:1,cat:'small'},
        {text:'500 000 — 2 000 000 ₸',score:2,cat:'medium'},
        {text:'2 000 000 — 10 000 000 ₸',score:3,cat:'large'},
        {text:'Более 10 000 000 ₸',score:4,cat:'huge'}
    ]},
    {q:'Как давно вы перевели последние деньги?',opts:[
        {text:'Менее 24 часов',score:1,cat:'very_recent'},
        {text:'1-7 дней',score:2,cat:'recent'},
        {text:'1-4 недели',score:3,cat:'month'},
        {text:'Более месяца',score:4,cat:'old'}
    ]},
    {q:'Что сейчас говорят мошенники?',opts:[
        {text:'Продолжают обещать возврат, просят подождать',score:3,cat:'lying'},
        {text:'Требуют заплатить «налог» / «комиссию» / «страховку»',score:4,cat:'extort'},
        {text:'Перестали отвечать / заблокировали',score:4,cat:'blocked'},
        {text:'Сайт удалён / номер отключён',score:4,cat:'gone'}
    ]},
    {q:'Заблокировали ли вы карту / счёт?',opts:[
        {text:'Нет, ещё не заблокировал(а)',score:4,cat:'not_blocked'},
        {text:'Да, но деньги уже ушли',score:3,cat:'blocked_late'},
        {text:'Да, заблокировал(а) вовремя',score:1,cat:'blocked_early'},
        {text:'Частично заблокировал(а)',score:2,cat:'partial'}
    ]},
    {q:'Обращались ли вы в банк / АРРФР / полицию?',opts:[
        {text:'Нет, ещё не обращался',score:4,cat:'no_report'},
        {text:'Позвонил(а), сказали ждать',score:3,cat:'called'},
        {text:'Подал(а) заявление',score:2,cat:'applied'},
        {text:'Получил(а) ответ / талон',score:1,cat:'response'}
    ]},
    {q:'Есть ли у вас доказательства?',opts:[
        {text:'Нет, всё удалил(а) / потерял(а)',score:4,cat:'no_evidence'},
        {text:'Частично (скриншоты / чеки)',score:3,cat:'partial_evidence'},
        {text:'Да, сохранил(а) все переписки и чеки',score:2,cat:'full_evidence'},
        {text:'Да, и готов(а) предоставить',score:1,cat:'ready_evidence'}
    ]},
    {q:'Как вы нашли эту платформу?',opts:[
        {text:'Рекомендовал знакомый / «инвестор»',score:3,cat:'friend'},
        {text:'Реклама в соцсетях / Telegram',score:3,cat:'social'},
        {text:'Нашёл сам через поиск',score:2,cat:'search'},
        {text:'Позвонил / написал «менеджер»',score:4,cat:'cold_call'}
    ]}
];
var currentQ=0,answers=[];
function renderQuestion(){
    var q=questions[currentQ];
    document.getElementById('qz-q').textContent=q.q;
    document.getElementById('qz-options').innerHTML=q.opts.map(function(o,i){
        return'<button class="qz-opt" onclick="selectOpt('+i+','+o.score+',\''+o.cat+'\')">'+o.text+'</button>';
    }).join('');
    document.getElementById('qz-bar').style.width=((currentQ)/questions.length)*100+'%';
    document.getElementById('qz-bar-text').textContent='Вопрос '+(currentQ+1)+' из '+questions.length;
}
function selectOpt(i,score,cat){
    document.querySelectorAll('.qz-opt')[i].classList.add('selected');
    answers.push({score:score,cat:cat,question:currentQ});
    setTimeout(function(){currentQ++;if(currentQ<questions.length)renderQuestion();else showResult()},400);
}
function showResult(){
    document.getElementById('qz-card').style.display='none';
    document.querySelector('.qz-progress').style.display='none';
    var totalScore=answers.reduce(function(a,b){return a+b.score},0);
    var avg=totalScore/questions.length;
    var lastPayment=answers.find(function(a){return a.question===2});
    var blocked=answers.find(function(a){return a.question===4});
    var reported=answers.find(function(a){return a.question===5});
    var evidence=answers.find(function(a){return a.question===6});
    var fraudType=answers.find(function(a){return a.question===0});
    var amount=answers.find(function(a){return a.question===1});
    var stage,icon,title,desc,hope,steps,urgency;
    var timeScore=lastPayment?lastPayment.score:2;
    if(avg>=3.2||timeScore>=3){
        stage='a';icon='🚨';title='Максимальная срочность';
        desc='Каждый день промедления снижает шансы на возврат. Но у вас есть реальный шанс вернуть средства — если действовать правильно и быстро.';
        hope='Данные показывают: при обращении в первые 72 часа шансы на возврат составляют до 78%. Вы ещё в этом окне!';
        urgency='НЕЛЬЗЯ ПОДОЖДАТЬ — начните прямо сейчас';
        steps=[
            {n:'1',t:'<strong>НЕ ПЕРЕВОДИТЕ больше денег</strong> — любые требования об оплате это повторное мошенничество'},
            {n:'2',t:'<strong>Заблокируйте карту</strong> немедленно — через приложение банка или по телефону горячей линии'},
            {n:'3',t:'<strong>Сохраните ВСЁ</strong> — скриншоты переписки, чеки, выписки, данные счетов мошенников'},
            {n:'4',t:'<strong>Свяжитесь с нами</strong> — мы поможем оформить документы и подать заявления в течение 24 часов'}
        ];
    }else if(avg>=2.2){
        stage='b';icon='⚠️';title='Активная фаза';
        desc='Ситуация серьёзная, но可控. У вас есть время для грамотных действий. Важно не упустить момент.';
        hope='У вас уже есть доказательства и вы начали действовать. Это увеличивает шансы на возврат до 65-85%.';
        urgency='Действуйте в ближайшие дни';
        steps=[
            {n:'1',t:'<strong>Зафиксируйте все доказательства</strong> — переписки, скриншоты интерфейса, выписки по счёту'},
            {n:'2',t:'<strong>Обратитесь в банк</strong> с заявлением о чарджбэке (оспаривание транзакции)'},
            {n:'3',t:'<strong>Подайте заявление</strong> в АРРФР (1434) и полицию (102)'},
            {n:'4',t:'<strong>Проконсультируйтесь с нами</strong> — оценим шансы и составим план действий'}
        ];
    }else{
        stage='c';icon='📋';title='Процесс запущен';
        desc='Вы уже сделали правильные шаги. Теперь важно правильно оформить документы и контролировать процесс.';
        hope='Вы уже прошли самое сложное. При правильном сопровождении шансы на возврат очень высоки.';
        urgency='Продолжайте действовать';
        steps=[
            {n:'1',t:'<strong>Проверьте статус заявлений</strong> — получили ли вы талон-уведомление из полиции'},
            {n:'2',t:'<strong>Контролируйте банк</strong> — если не получен ответ за 30 дней, подайте жалобу в НБ РК'},
            {n:'3',t:'<strong>Подготовьте документы</strong> для суда — если другие методы не помогли'},
            {n:'4',t:'<strong>Обратитесь к нам</strong> — мы поможем с судебным процессом и взысканием'}
        ];
    }
    var typeNames={invest:'Инвестиционное мошенничество',crypto:'Крипто-мошенничество',forex:'Forex / опционы',mfo:'Микрозайм / банк'};
    var amountNames={small:'до 500 000 ₸',medium:'500 000 — 2 000 000 ₸',large:'2 — 10 млн ₸',huge:'свыше 10 млн ₸'};
    var timeNames={very_recent:'менее 24 часов',recent:'1-7 дней',month:'1-4 недели',old:'более месяца'};
    var evidenceNames={no_evidence:'нет доказательств',partial_evidence:'частично есть',full_evidence:'сохранил всё',ready_evidence:'готов предоставить'};
    var h='<div class="qz-stage-'+stage+'"><div class="qz-result-card">';
    h+='<div class="qz-stage-icon">'+icon+'</div>';
    h+='<div class="qz-stage-badge">'+title+'</div>';
    h+='<div class="qz-stage-title">'+title+'</div>';
    h+='<div class="qz-stage-desc">'+desc+'</div>';
    h+='<div class="qz-summary"><div class="qz-summary-title">📊 Ваша ситуация:</div>';
    h+='<div class="qz-summary-item"><span class="qz-summary-label">Тип мошенничества</span><span class="qz-summary-value">'+typeNames[answers[0].cat]+'</span></div>';
    h+='<div class="qz-summary-item"><span class="qz-summary-label">Сумма потерь</span><span class="qz-summary-value">'+amountNames[answers[1].cat]+'</span></div>';
    h+='<div class="qz-summary-item"><span class="qz-summary-label">Последний платёж</span><span class="qz-summary-value">'+timeNames[answers[2].cat]+'</span></div>';
    h+='<div class="qz-summary-item"><span class="qz-summary-label">Доказательства</span><span class="qz-summary-value">'+evidenceNames[answers[6].cat]+'</span></div>';
    h+='</div>';
    h+='<div class="qz-stage-hope"><div class="qz-stage-hope-title">💚 Хорошая новость:</div><div class="qz-stage-hope-text">'+hope+'</div></div>';
    h+='<div style="background:rgba(184,0,24,.1);border:1px solid rgba(184,0,24,.3);border-radius:12px;padding:12px;margin-bottom:20px;font-weight:700;color:#fff;font-size:.9rem">'+urgency+'</div>';
    h+='<div class="qz-steps">';
    steps.forEach(function(s){h+='<div class="qz-step"><div class="qz-step-num">'+s.n+'</div><div class="qz-step-text">'+s.t+'</div></div>'});
    h+='</div>';
    h+='<a href="/antifraud-kz/contacts.html" class="qz-result-btn">📝 Связаться со специалистом сейчас</a>';
    h+='<div class="qz-restart" onclick="restart()">Пройти тест заново</div>';
    h+='</div></div>';
    document.getElementById('qz-result').innerHTML=h;
    document.getElementById('qz-result').classList.add('show');
    document.getElementById('qz-result').scrollIntoView({behavior:'smooth',block:'start'});
}
function restart(){currentQ=0;answers=[];document.getElementById('qz-card').style.display='block';document.querySelector('.qz-progress').style.display='block';document.getElementById('qz-result').classList.remove('show');renderQuestion();window.scrollTo({top:0,behavior:'smooth'})}
renderQuestion();
</script>
<script src="/antifraud-kz/assets/js/nav.js"></script>
</body>
</html>
