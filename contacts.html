<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Контакты — Антифрод Центр Казахстан</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✉️</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{primary:'#B80018',gold:'#C8A000',dark:'#1A1A1A',darker:'#000000'},fontFamily:{heading:['Oswald','sans-serif'],body:['PT Sans','sans-serif']}}}}</script>
<link rel="stylesheet" href="/antifraud-kz/assets/css/styles.css">
<style>
body{background:#000;color:#fff;font-family:'PT Sans',sans-serif;padding-bottom:80px}
.cw{max-width:640px;margin:0 auto;padding:clamp(20px,5vw,40px) clamp(16px,4vw,16px)}
.cw h1{font-size:clamp(1.6rem,4vw,2.2rem);font-weight:700;margin-bottom:6px;text-align:center}
.cw>p{color:#7a8ba3;margin-bottom:24px;font-size:.92rem;text-align:center}
.form-box{background:#1A1A1A;border:1px solid rgba(255,255,255,.06);border-radius:20px;padding:24px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:.82rem;color:#7a8ba3;margin-bottom:6px}
.fg input,.fg select,.fg textarea{width:100%;padding:13px 16px;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);border-radius:12px;font-size:.95rem;color:#fff;font-family:'PT Sans',sans-serif;transition:all .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:rgba(184,0,24,.4)}
.fg textarea{min-height:80px;resize:vertical}
.fg select option{background:#1A1A1A;color:#fff}
.submit-btn{width:100%;padding:16px;background:linear-gradient(135deg,#B80018,#8B0012);color:#fff;border:none;border-radius:12px;font-family:'Oswald',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;transition:all .2s}
.submit-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(184,0,24,.3)}
.trust-badges{display:flex;justify-content:center;gap:20px;margin-top:20px;flex-wrap:wrap}
.trust-badge{font-size:.78rem;color:#7a8ba3;display:flex;align-items:center;gap:6px}
.sent-msg{text-align:center;padding:32px 0;display:none}
</style>
</head>
<body>
<div class="cw" style="padding-top:100px">
    <h1 data-reveal>✉️ Оставьте заявку</h1>
    <p data-reveal>Выберите причину обращения и заполните форму</p>

    <div class="form-box glass-card" id="formBox" data-reveal>
        <div style="text-align:center;margin-bottom:16px">
            <div style="display:inline-flex;align-items:center;gap:8px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);border-radius:100px;padding:6px 16px">
                <div style="width:6px;height:6px;background:#10b981;border-radius:50%;animation:pulse 2s infinite"></div>
                <span style="color:#10b981;font-size:.82rem;font-weight:700">Бесплатная консультация</span>
            </div>
        </div>

        <div class="fg">
            <label>Что вам нужно? *</label>
            <select id="cType">
                <option value="">— Выберите —</option>
                <option value="callback">📞 Обратный звонок</option>
                <option value="consult">💬 Консультация юриста</option>
                <option value="docs">📄 Получить документ / справку</option>
                <option value="return">💰 Возврат средств</option>
                <option value="check">🔍 Проверка организации</option>
                <option value="chargeback">🏦 Чарджбэк (оспаривание платежа)</option>
                <option value="complaint">🏛️ Жалоба в АРРФР / НБ РК</option>
                <option value="court">⚖️ Подготовка иска в суд</option>
                <option value="police">👮 Обращение в полицию</option>
                <option value="crypto">₿ Проблема с криптой</option>
                <option value="credit">💳 Проблемы с кредитом</option>
                <option value="insurance">🛡️ Страховой случай</option>
                <option value="other">📝 Другое</option>
            </select>
        </div>

        <div class="fg"><label>Ваше имя *</label><input type="text" id="cName" placeholder="Иван Иванов"></div>
        <div class="fg"><label>Телефон *</label><input type="tel" id="cPhone" placeholder="+7 7XX XXX XX XX"></div>
        <div class="fg"><label>Когда удобно звонить?</label>
            <select id="cTime"><option value="any">В любое время</option><option value="morning">Утром (9-12)</option><option value="afternoon">Днём (12-17)</option><option value="evening">Вечером (17-20)</option></select>
        </div>
        <div class="fg"><label>Опишите ситуацию</label><textarea id="cText" placeholder="Что произошло, какая сумма, название платформы..."></textarea></div>
        <button class="submit-btn btn-ripple" onclick="submitForm()">ОТПРАВИТЬ ЗАЯВКУ →</button>
        <div class="trust-badges">
            <div class="trust-badge">🔒 Конфиденциально</div>
            <div class="trust-badge">⚡ Ответ за 24ч</div>
            <div class="trust-badge">💳 Без предоплаты</div>
        </div>
    </div>

    <div class="sent-msg" id="sentMsg">
        <div style="font-size:3rem;margin-bottom:12px">✅</div>
        <h3 style="font-size:1.2rem;font-weight:700;margin-bottom:8px">Заявка отправлена!</h3>
        <p style="color:#7a8ba3">Наш специалист свяжется с вами в ближайшее время</p>
        <a href="/antifraud-kz/" style="display:inline-block;margin-top:16px;color:#B80018;text-decoration:none;font-weight:700">← Вернуться на главную</a>
    </div>
</div>

<script>
function submitForm(){
    var name=document.getElementById('cName').value.trim();
    var phone=document.getElementById('cPhone').value.trim();
    var type=document.getElementById('cType').value;
    var time=document.getElementById('cTime').value;
    var text=document.getElementById('cText').value.trim();
    if(!name||!phone){alert('Заполните имя и телефон');return}
    if(!type){alert('Выберите причину обращения');return}
    var types={callback:'Обратный звонок',consult:'Консультация юриста',docs:'Получить документ',return:'Возврат средств',check:'Проверка организации',chargeback:'Чарджбэк',complaint:'Жалоба в АРРФР',court:'Подготовка иска',police:'Обращение в полицию',crypto:'Проблема с криптой',credit:'Проблемы с кредитом',insurance:'Страховой случай',other:'Другое'};
    var times={any:'В любое время',morning:'Утром (9-12)',afternoon:'Днём (12-17)',evening:'Вечером (17-20)'};
    var msg='📋 Заявка с сайта\n\n📞 Тип: '+(types[type]||type)+'\n👤 Имя: '+name+'\n📱 Телефон: '+phone+'\n⏰ Удобное время: '+(times[time]||time)+'\n💬 '+text;
    fetch('https://api.telegram.org/bot8829750295:AAEdnt-7FPCVuVbgj6tgn7eC2_2LpY5VHCk/sendMessage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:'8471070560',text:msg})}).then(function(r){return r.json()}).then(function(d){
        if(d.ok){
            document.getElementById('formBox').style.display='none';
            document.getElementById('sentMsg').style.display='block';
        }else{alert('Ошибка отправки')}
    }).catch(function(){alert('Ошибка сети')});
}
</script>
<script src="/antifraud-kz/assets/js/effects.js"></script>
<script src="/antifraud-kz/assets/js/nav.js"></script>
</body>
</html>
