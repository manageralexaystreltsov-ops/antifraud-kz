<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Контакты — Антифрод Центр Казахстан</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✉️</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{primary:'#B80018',gold:'#C8A000',dark:'#1A1A1A',darker:'#000000'},fontFamily:{heading:['Oswald','sans-serif'],body:['PT Sans','sans-serif']}}}}</script>
<link rel="stylesheet" href="/antifraud-kz/assets/css/styles.css">
</head>
<body class="bg-darker text-white font-body">
<main class="pt-24 pb-16">
    <div class="container mx-auto px-4 max-w-2xl">
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-2 bg-green-500/20 border border-green-500/30 rounded-full px-4 py-1 mb-4"><div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div><span class="text-green-400 text-sm font-bold">Бесплатная консультация</span></div>
            <h1 class="font-heading text-4xl md:text-5xl font-bold mb-4">ОСТАВЬТЕ <span class="text-primary">ЗАЯВКУ</span></h1>
            <p class="text-xl text-gray-400">Ответим в течение 24 часов</p>
        </div>
        <div class="grid grid-cols-4 gap-3 mb-8">
            <button class="contact-type bg-dark p-4 rounded-xl border border-gray-800 hover:border-primary transition text-center" data-type="return"><span class="text-2xl block mb-1">💰</span><span class="text-xs text-gray-400">Возврат</span></button>
            <button class="contact-type bg-dark p-4 rounded-xl border border-gray-800 hover:border-primary transition text-center" data-type="docs"><span class="text-2xl block mb-1">📄</span><span class="text-xs text-gray-400">Документы</span></button>
            <button class="contact-type bg-dark p-4 rounded-xl border border-gray-800 hover:border-primary transition text-center" data-type="consult"><span class="text-2xl block mb-1">💬</span><span class="text-xs text-gray-400">Консультация</span></button>
            <button class="contact-type bg-dark p-4 rounded-xl border border-gray-800 hover:border-primary transition text-center" data-type="org"><span class="text-2xl block mb-1">🏛️</span><span class="text-xs text-gray-400">Организациям</span></button>
        </div>
        <form id="contactForm" class="bg-dark p-6 rounded-xl border border-gray-800 space-y-4">
            <input type="hidden" id="contactType" value="return">
            <div><label class="block text-sm font-bold mb-2">Имя *</label><input type="text" name="name" required class="w-full bg-darker border border-gray-700 rounded-lg px-4 py-3 text-white focus:border-primary outline-none"></div>
            <div><label class="block text-sm font-bold mb-2">Телефон *</label><input type="tel" name="phone" required class="w-full bg-darker border border-gray-700 rounded-lg px-4 py-3 text-white focus:border-primary outline-none"></div>
            <div><label class="block text-sm font-bold mb-2">Email</label><input type="email" name="email" class="w-full bg-darker border border-gray-700 rounded-lg px-4 py-3 text-white focus:border-primary outline-none"></div>
            <div><label class="block text-sm font-bold mb-2">Название платформы</label><input type="text" name="platform" class="w-full bg-darker border border-gray-700 rounded-lg px-4 py-3 text-white focus:border-primary outline-none"></div>
            <div><label class="block text-sm font-bold mb-2">Сумма убытка</label><input type="text" name="amount" placeholder="В тенге" class="w-full bg-darker border border-gray-700 rounded-lg px-4 py-3 text-white focus:border-primary outline-none"></div>
            <div><label class="block text-sm font-bold mb-2">Опишите ситуацию</label><textarea name="details" rows="4" class="w-full bg-darker border border-gray-700 rounded-lg px-4 py-3 text-white focus:border-primary outline-none"></textarea></div>
            <button type="submit" class="w-full bg-primary hover:bg-primary/80 py-4 rounded-lg font-heading text-lg transition">ОТПРАВИТЬ ЗАЯВКУ</button>
        </form>
        <div id="formSuccess" class="hidden text-center py-12"><div class="text-4xl mb-4">✅</div><h3 class="font-heading text-2xl font-bold mb-2">ОТПРАВЛЕНО!</h3><p class="text-gray-400">Мы свяжемся с вами в ближайшее время</p></div>
        <div class="flex justify-center gap-4 mt-8 text-sm text-gray-500">
            <span>🔒 Конфиденциально</span>
            <span>⚡ Ответ за 24ч</span>
            <span>💳 Без предоплаты</span>
        </div>
    </div>
</main>
<script>
document.querySelectorAll('.contact-type').forEach(function(btn){
    btn.addEventListener('click',function(){
        document.querySelectorAll('.contact-type').forEach(function(b){b.classList.remove('border-primary')});
        btn.classList.add('border-primary');
        document.getElementById('contactType').value=btn.getAttribute('data-type');
    });
});
document.getElementById('contactForm').addEventListener('submit',function(e){
    e.preventDefault();
    var data={type:document.getElementById('contactType').value,name:this.name.value,phone:this.phone.value,email:this.email.value,platform:this.platform.value,amount:this.amount.value,details:this.details.value,timestamp:new Date().toISOString()};
    var apps=JSON.parse(localStorage.getItem('applications')||'[]');
    apps.push(data);
    localStorage.setItem('applications',JSON.stringify(apps));
    this.style.display='none';
    document.getElementById('formSuccess').classList.remove('hidden');
});
document.querySelector('.contact-type').click();
</script>
<script src="/antifraud-kz/assets/js/nav.js"></script>
</body>
</html>
