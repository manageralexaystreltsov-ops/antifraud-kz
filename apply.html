<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Помочь | Анти-Фрод Казахстан</title>
    <meta name="description" content="Помогите нам в борьбе с мошенничеством. Сообщите о случаях обмана.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚠️</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#B80018',
                        gold: '#C8A000',
                        dark: '#1A1A1A',
                        darker: '#000000'
                    },
                    fontFamily: {
                        heading: ['Oswald', 'sans-serif'],
                        body: ['PT Sans', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="bg-darker text-white font-body">
    <!-- Header -->

    <!-- Main Content -->
    <main class="pt-24 pb-16">
        <div class="container mx-auto px-4">
            <div class="max-w-2xl mx-auto">
                <!-- Page Header -->
                <div class="text-center mb-12">
                    <h1 class="font-heading text-4xl md:text-5xl font-bold mb-4">ПОМОЧЬ <span class="text-primary">НАМ</span></h1>
                    <p class="text-xl text-gray-400">Сообщите о случаях мошенничества или предложите помощь</p>
                </div>

                <!-- Form -->
                <div class="bg-dark rounded-2xl p-6 md:p-8 border border-gray-800">
                    <form id="applyForm" class="space-y-6">
                        <div>
                            <label class="block text-sm font-bold mb-2">Ваше имя *</label>
                            <input type="text" name="name" required placeholder="Как к вам обращаться?" class="w-full">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">Телефон *</label>
                            <input type="tel" name="phone" required placeholder="+7 (___) ___-__-__" class="w-full">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">Email</label>
                            <input type="email" name="email" placeholder="your@email.com" class="w-full">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">Тип обращения *</label>
                            <select name="type" required class="w-full">
                                <option value="">Выберите тип</option>
                                <option value="report">Сообщить о мошенничестве</option>
                                <option value="help">Предложить помощь</option>
                                <option value="feedback">Обратная связь</option>
                                <option value="other">Другое</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">Сообщение *</label>
                            <textarea name="message" required rows="4" placeholder="Опишите ситуацию..." class="w-full"></textarea>
                        </div>
                        <div class="flex items-start gap-3">
                            <input type="checkbox" id="consent" required class="w-5 h-5 mt-1">
                            <label for="consent" class="text-sm text-gray-400">
                                Я согласен на обработку персональных данных
                            </label>
                        </div>
                        <button type="submit" class="btn-primary w-full py-4 rounded-lg font-heading text-lg">
                            ОТПРАВИТЬ
                        </button>
                    </form>
                    
                    <div id="formSuccess" class="hidden text-center py-8">
                        <div class="w-16 h-16 bg-green-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
                            <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                            </svg>
                        </div>
                        <h3 class="font-heading text-2xl font-bold mb-2">СПАСИБО!</h3>
                        <p class="text-gray-400 mb-6">Ваше сообщение отправлено</p>
                        <a href="/antifraud-kz/" class="btn-primary px-6 py-3 rounded-lg font-heading inline-block">
                            ВЕРНУТЬСЯ НА ГЛАВНУЮ
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->

    <!-- WhatsApp Button -->

    <script src="/antifraud-kz/assets/js/nav.js"></script>
<script src="/antifraud-kz/assets/js/main.js"></script>
    <script>
        document.getElementById('applyForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const form = e.target;
            const formData = new FormData(form);
            
            // Save to localStorage
            const applications = JSON.parse(localStorage.getItem('applications') || '[]');
            applications.push({
                id: Date.now(),
                name: formData.get('name'),
                phone: formData.get('phone'),
                email: formData.get('email'),
                type: formData.get('type'),
                message: formData.get('message'),
                timestamp: new Date().toISOString()
            });
            localStorage.setItem('applications', JSON.stringify(applications));
            
            // Show success
            form.classList.add('hidden');
            document.getElementById('formSuccess').classList.remove('hidden');
        });
    </script>
</body>
</html>
