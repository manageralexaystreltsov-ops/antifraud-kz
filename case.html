<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Отслеживание дела — Антифрод Центр Казахстан</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{primary:'#B80018',gold:'#C8A000',dark:'#1A1A1A',darker:'#000000'},fontFamily:{heading:['Oswald','sans-serif'],body:['PT Sans','sans-serif']}}}}</script>
<style>
body{background:#000;color:#fff;font-family:'PT Sans',sans-serif;padding-bottom:80px}
.wrap{max-width:640px;margin:0 auto;padding:clamp(30px,6vw,60px) clamp(16px,4vw,24px)}
.wrap h1{font-size:clamp(1.8rem,5vw,2.5rem);font-weight:700;margin-bottom:8px;text-align:center}
.wrap>p{color:#7a8ba3;text-align:center;margin-bottom:32px;font-size:1rem;line-height:1.6}
.search-frame{background:#1A1A1A;border:1px solid rgba(255,255,255,.06);border-radius:20px;padding:24px;margin-bottom:24px}
.search-row{display:flex;gap:12px}
.search-input{flex:1;padding:18px 20px;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);border-radius:14px;font-size:1.1rem;font-family:'PT Sans',sans-serif;color:#fff}
.search-input::placeholder{color:#555}
.search-input:focus{border-color:rgba(184,0,24,.4);outline:none}
.search-btn{padding:18px 32px;background:linear-gradient(135deg,#B80018,#8B0012);color:#fff;border:none;border-radius:14px;font-family:'Oswald',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;transition:all .3s}
.search-btn:hover{transform:translateY(-1px)}
.search-hint{font-size:.78rem;color:#555;text-align:center;margin-top:12px}
.case-card{display:none;animation:fadeUp .5s ease}
.case-card.show{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.case-id-box{background:#1A1A1A;border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:20px;text-align:center;margin-bottom:20px}
.case-id-label{font-size:.72rem;color:#7a8ba3;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.case-id-value{font-family:'Oswald',sans-serif;font-size:1.8rem;font-weight:700;color:#fff}
.status-badge{display:inline-block;padding:6px 16px;border-radius:100px;font-size:.82rem;font-weight:700;margin-top:8px}
.s-new{background:rgba(99,102,241,.1);color:#818cf8;border:1px solid rgba(99,102,241,.2)}
.s-process{background:rgba(245,158,11,.1);color:#fbbf24;border:1px solid rgba(245,158,11,.2)}
.s-return{background:rgba(16,185,129,.1);color:#6ee7b7;border:1px solid rgba(16,185,129,.2)}
.s-done{background:rgba(16,185,129,.2);color:#34d399;border:1px solid rgba(16,185,129,.3)}
.progress-outer{height:6px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;margin:16px 0}
.progress-inner{height:100%;background:linear-gradient(90deg,#B80018,#C8A000);border-radius:4px;transition:width 1s ease}
.detail-box{background:#1A1A1A;border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:16px;margin-bottom:20px}
.detail-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.9rem}
.detail-row:last-child{border-bottom:none}
.detail-label{color:#7a8ba3}
.detail-value{color:#fff;font-weight:600}
.tl{position:relative;padding-left:36px}
.tl::before{content:'';position:absolute;left:13px;top:0;bottom:0;width:2px;background:rgba(255,255,255,.06)}
.tl-item{position:relative;margin-bottom:16px}
.tl-dot{position:absolute;left:-28px;top:14px;width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.1)}
.tl-dot.done{background:#10b981;border-color:#10b981}
.tl-dot.active{background:#B80018;border-color:#B80018;box-shadow:0 0 12px rgba(184,0,24,.4)}
.tl-dot.pending{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.08)}
.tl-content{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:10px;padding:12px 16px}
.tl-date{font-size:.75rem;color:#7a8ba3;margin-bottom:4px}
.tl-title{font-weight:700;font-size:.9rem;color:#fff;margin-bottom:2px}
.tl-desc{font-size:.82rem;color:#e8ecf4}
.no-result{text-align:center;padding:60px 20px}
.no-result-icon{font-size:4rem;margin-bottom:16px}
.no-result h2{font-size:1.3rem;font-weight:700;color:#fff;margin-bottom:8px}
.no-result p{color:#7a8ba3;font-size:.92rem;margin-bottom:20px}
.no-result a{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:linear-gradient(135deg,#B80018,#8B0012);color:#fff;border-radius:12px;font-weight:700;text-decoration:none;transition:all .2s}
.no-result a:hover{transform:translateY(-1px);color:#fff;text-decoration:none}
</style>
</head>
<body>
<div class="wrap" style="padding-top:100px">
    <h1>📋 Отслеживание дела</h1>
    <p>Введите номер дела чтобы увидеть статус и таймлайн</p>

    <div class="search-frame">
        <div class="search-row">
            <input type="text" class="search-input" id="caseInput" placeholder="Номер дела: AF-2026-0847" onkeydown="if(event.key==='Enter')findCase()">
            <button class="search-btn" onclick="findCase()">Найти</button>
        </div>
        <div class="search-hint">Пример: AF-2026-0847, AF-2026-0001, AF-2026-0123</div>
    </div>

    <div id="caseResult"></div>
</div>

<script>
var CASES={
    'AF-2026-0847':{client:'Абай К.',platform:'InvestPro Capital',amount:'2 500 000 ₸',status:'return',statusText:'Возврат средств',progress:75,tl:[
        {date:'15.01.2026',t:'Заявка получена',d:'Клиент обратился с жалобой на инвест. платформу',s:'done'},
        {date:'16.01.2026',t:'Анализ ситуации',d:'Проверена платформа — в чёрном списке АРРФР',s:'done'},
        {date:'18.01.2026',t:'Заявление в банк',d:'Подано заявление на чарджбэк',s:'done'},
        {date:'25.01.2026',t:'Банк принял',d:'Банк начал процесс оспаривания',s:'done'},
        {date:'10.02.2026',t:'Ожидание решения',d:'Дополнительные документы запрошены',s:'active'},
        {date:'—',t:'Возврат средств',d:'Ожидаем поступления',s:'pending'},
        {date:'—',t:'Завершение',d:'Подтверждение возврата',s:'pending'}
    ]},
    'AF-2026-0001':{client:'Мария С.',platform:'CryptoGain KZ',amount:'5 000 000 ₸',status:'process',statusText:'В работе',progress:30,tl:[
        {date:'01.01.2026',t:'Заявка получена',d:'Фейковая криптобиржа',s:'done'},
        {date:'02.01.2026',t:'Сбор доказательств',d:'Переписки, чеки, выписки',s:'done'},
        {date:'05.01.2026',t:'Заявление в АРРФР',d:'Жалоба в АРРФР и НБ РК',s:'active'},
        {date:'—',t:'Рассмотрение',d:'Ожидание ответа регулятора',s:'pending'},
        {date:'—',t:'Суд',d:'Подготовка иска',s:'pending'},
        {date:'—',t:'Возврат',d:'Контроль возврата',s:'pending'}
    ]},
    'AF-2026-0123':{client:'Даулет Н.',platform:'GlobalTrade FX',amount:'750 000 ₸',status:'done',statusText:'Завершено',progress:100,tl:[
        {date:'10.12.2025',t:'Заявка',d:'Жалоба на Forex-брокер',s:'done'},
        {date:'12.12.2025',t:'Чарджбэк',d:'Заявление в банк',s:'done'},
        {date:'20.12.2025',t:'Одобрен',d:'Транзакция оспорена',s:'done'},
        {date:'05.01.2026',t:'Возврат',d:'680 000 ₸ возвращено',s:'done'}
    ]}
};

function findCase(){
    var id=document.getElementById('caseInput').value.trim().toUpperCase();
    var c=CASES[id];
    var box=document.getElementById('caseResult');
    if(!c){box.innerHTML='<div class="no-result"><div class="no-result-icon">🔍</div><h2>Дело не найдено</h2><p>Проверьте номер или обратитесь к специалисту</p><a href="/antifraud-kz/quiz.html">📝 Связаться</a></div>';return}
    var sc={new:'s-new',process:'s-process',return:'s-return',done:'s-done'};
    var dc={done:'done',active:'active',pending:'pending'};
    var h='<div class="case-card show">';
    h+='<div class="case-id-box"><div class="case-id-label">Номер дела</div><div class="case-id-value">'+id+'</div><div class="status-badge '+(sc[c.status]||'')+'">'+c.statusText+'</div></div>';
    h+='<div class="progress-outer"><div class="progress-inner" style="width:'+c.progress+'%"></div></div>';
    h+='<div class="detail-box">';
    h+='<div class="detail-row"><span class="detail-label">Клиент</span><span class="detail-value">'+c.client+'</span></div>';
    h+='<div class="detail-row"><span class="detail-label">Платформа</span><span class="detail-value">'+c.platform+'</span></div>';
    h+='<div class="detail-row"><span class="detail-label">Сумма</span><span class="detail-value">'+c.amount+'</span></div>';
    h+='<div class="detail-row"><span class="detail-label">Прогресс</span><span class="detail-value">'+c.progress+'%</span></div>';
    h+='</div>';
    h+='<h3 style="font-family:Oswald,sans-serif;font-weight:700;font-size:1rem;margin-bottom:16px">Таймлайн</h3>';
    h+='<div class="tl">';
    c.tl.forEach(function(t){
        h+='<div class="tl-item"><div class="tl-dot '+(dc[t.s]||'')+'"></div><div class="tl-content"><div class="tl-date">'+t.date+'</div><div class="tl-title">'+t.t+'</div><div class="tl-desc">'+t.d+'</div></div></div>';
    });
    h+='</div>';
    h+='<div style="text-align:center;margin-top:24px"><a href="/antifraud-kz/quiz.html" style="display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:linear-gradient(135deg,#B80018,#8B0012);color:#fff;border-radius:12px;font-weight:700;text-decoration:none">📝 Связаться со специалистом</a></div>';
    h+='</div>';
    box.innerHTML=h;
    box.scrollIntoView({behavior:'smooth',block:'start'});
}

var p=new URLSearchParams(window.location.search);
var cid=p.get('id');
if(cid){document.getElementById('caseInput').value=cid;findCase()}
</script>
<script src="/antifraud-kz/assets/js/nav.js"></script>
</body>
</html>
