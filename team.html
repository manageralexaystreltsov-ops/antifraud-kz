function stars(r){
  var s='';
  for(var i=1;i<=5;i++){
    if(r>=i) s+='★';
    else if(r>=i-0.5) s+='★';
    else s+='☆';
  }
  return s;
}

function renderTeam(list){
  var h='';
  list.forEach(function(t,i){
    var initials=t.name.split(' ').map(function(w){return w[0]}).join('').substring(0,2);
    h+='<div class="team-card" data-filter>'+
      '<div class="team-avatar">'+initials+'</div>'+
      '<div class="team-name">'+t.name+'</div>'+
      '<div class="team-role">'+t.role+'</div>'+
      '<div class="team-spec">'+t.spec+'</div>'+
      '<div class="team-meta">'+
        '<div class="team-stat">Стаж <strong>'+t.exp+'</strong> лет</div>'+
        '<div class="team-stat"><strong>'+t.cases+'</strong> дел</div>'+
      '</div>'+
      (t.rating?'<div class="team-rating">'+stars(t.rating)+'</div>':'')+
      '<div class="team-city">📍 '+t.city+'</div>'+
      (t.bio?'<div class="team-bio">'+t.bio+'</div>':'')+
    '</div>';
  });
  document.getElementById('teamGrid').innerHTML=h;
}

function filterTeam(q,btn){
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  if(q==='all'){renderTeam(TEAM);return}
  renderTeam(TEAM.filter(function(t){
    return t.role.indexOf(q)>=0||t.spec.toLowerCase().indexOf(q.toLowerCase())>=0;
  }));
}

renderTeam(TEAM);
