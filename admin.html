<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Админ-панель — Антифрод Центр</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#fff;font-family:'PT Sans',sans-serif}
.login-box{max-width:400px;margin:100px auto;padding:32px;background:#1A1A1A;border:1px solid rgba(255,255,255,.08);border-radius:16px}
.login-input{width:100%;padding:14px 16px;background:rgba(255,255,255,.03);border:1.5px solid rgba(255,255,255,.08);border-radius:10px;color:#fff;font-size:.95rem;margin-bottom:12px;font-family:'PT Sans',sans-serif}
.login-input:focus{border-color:rgba(184,0,24,.4);outline:none}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,#B80018,#C8A000);color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:.95rem}
.admin-panel{display:none}
.admin-top{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:#111;border-bottom:1px solid rgba(255,255,255,.06);position:sticky;top:0;z-index:10}
.tabs{display:flex;gap:6px;padding:12px 20px;background:#0a0a0a;border-bottom:1px solid rgba(255,255,255,.06);flex-wrap:wrap}
.tab{padding:8px 14px;border-radius:8px;cursor:pointer;font-size:.82rem;font-weight:600;transition:all .2s;background:rgba(255,255,255,.03);color:#7a8ba3;border:1px solid transparent}
.tab.active{background:rgba(184,0,24,.12);color:#fff;border-color:rgba(184,0,24,.3)}
.tab:hover:not(.active){color:#fff}
.section{display:none;padding:20px}.section.active{display:block}
.section h2{font-family:'Oswald',sans-serif;font-size:1.3rem;font-weight:700;margin-bottom:16px}
.badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:.68rem;font-weight:700}
.badge-new{background:rgba(99,102,241,.1);color:#818cf8;border:1px solid rgba(99,102,241,.2)}
.badge-process{background:rgba(245,158,11,.1);color:#fbbf24;border:1px solid rgba(245,158,11,.2)}
.badge-done{background:rgba(16,185,129,.1);color:#6ee7b7;border:1px solid rgba(16,185,129,.2)}
.btn{padding:8px 14px;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;border:none;transition:all .2s;font-family:'PT Sans',sans-serif;display:inline-flex;align-items:center;gap:4px}
.btn-primary{background:#B80018;color:#fff}.btn-primary:hover{background:#d4001e}
.btn-secondary{background:rgba(255,255,255,.05);color:#e8ecf4;border:1px solid rgba(255,255,255,.08)}.btn-secondary:hover{background:rgba(255,255,255,.1)}
.btn-danger{background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.2)}.btn-danger:hover{background:rgba(239,68,68,.2)}
.btn-success{background:rgba(16,185,129,.1);color:#6ee7b7;border:1px solid rgba(16,185,129,.2)}.btn-success:hover{background:rgba(16,185,129,.2)}
.form-group{margin-bottom:12px}
.form-label{font-size:.78rem;color:#7a8ba3;margin-bottom:4px;display:block;font-weight:600}
.form-input{width:100%;padding:10px 14px;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);border-radius:8px;color:#fff;font-size:.88rem;font-family:'PT Sans',sans-serif}
.form-input:focus{border-color:rgba(184,0,24,.4);outline:none}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-select{width:100%;padding:10px 14px;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);border-radius:8px;color:#fff;font-size:.88rem;font-family:'PT Sans',sans-serif}
.form-select option{background:#1A1A1A;color:#fff}
textarea.form-input{min-height:80px;resize:vertical}

/* Client Cards */
.client-card{background:rgba(26,26,26,.6);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px;margin-bottom:8px;cursor:pointer;transition:all .3s}
.client-card:hover{border-color:rgba(184,0,24,.3);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.client-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.client-name{font-weight:700;font-size:.95rem}
.client-meta{display:flex;gap:10px;font-size:.75rem;color:#7a8ba3;flex-wrap:wrap}
.client-actions{display:flex;gap:4px}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);overflow-y:auto;padding:20px}
.modal-overlay.show{display:flex;align-items:flex-start;justify-content:center}
.modal{width:100%;max-width:640px;margin:40px auto;background:#141414;border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:28px;position:relative;animation:modalIn .3s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:6px 12px;color:#7a8ba3;cursor:pointer;font-size:.8rem;font-family:'PT Sans',sans-serif}
.modal-close:hover{background:rgba(255,255,255,.1);color:#fff}
.modal-header{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.modal-avatar{width:52px;height:52px;background:linear-gradient(135deg,#B80018,#C8A000);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:700;color:#fff;font-family:'Oswald',sans-serif;flex-shrink:0}
.modal-info h2{font-family:'Oswald',sans-serif;font-size:1.3rem;font-weight:700}
.modal-info p{font-size:.82rem;color:#7a8ba3}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.info-item{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:10px;padding:12px}
.info-item .label{font-size:.68rem;color:#7a8ba3;margin-bottom:2px;text-transform:uppercase;letter-spacing:.3px}
.info-item .value{font-weight:700;font-size:.9rem}
.action-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px}
.action-btn{padding:10px;border-radius:10px;font-size:.78rem;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:#e8ecf4;font-family:'PT Sans',sans-serif;transition:all .2s;text-align:center}
.action-btn:hover{background:rgba(184,0,24,.1);border-color:rgba(184,0,24,.3);color:#fff}
.action-btn.danger:hover{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.3);color:#fca5a5}

@media(max-width:600px){.form-row{grid-template-columns:1fr}.info-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="loginScreen" class="login-box">
    <div style="text-align:center;margin-bottom:24px">
        <div style="width:60px;height:60px;background:linear-gradient(135deg,#B80018,#C8A000);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px"><svg style="width:28px;height:28px;color:#fff" fill="currentColor" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg></div>
        <h2 style="font-family:'Oswald',sans-serif;font-size:1.3rem;font-weight:700">Админ-панель</h2>
        <p style="color:#7a8ba3;font-size:.85rem">Введите пароль для доступа</p>
    </div>
    <input type="password" class="login-input" id="loginPass" placeholder="Пароль" onkeydown="if(event.key==='Enter')login()">
    <p id="loginError" style="color:#fca5a5;font-size:.82rem;display:none;margin-bottom:12px">Неверный пароль</p>
    <button class="login-btn" onclick="login()">Войти</button>
</div>

<div id="adminPanel" class="admin-panel">
    <div class="admin-top">
        <div style="display:flex;align-items:center;gap:10px">
            <div style="width:32px;height:32px;background:linear-gradient(135deg,#B80018,#C8A000);border-radius:8px;display:flex;align-items:center;justify-content:center"><svg style="width:18px;height:18px;color:#fff" fill="currentColor" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg></div>
            <span style="font-family:'Oswald',sans-serif;font-weight:700;font-size:1rem">АДМИН</span>
        </div>
        <button class="btn btn-secondary" onclick="logout()">Выйти</button>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="showSection('clients',this)">👥 Клиенты</button>
        <button class="tab" onclick="showSection('addclient',this)">➕ Новый</button>
        <button class="tab" onclick="showSection('apps',this)">📋 Заявки</button>
        <button class="tab" onclick="showSection('cases',this)">📂 Дела</button>
    </div>

    <div id="clients" class="section active">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
            <h2>👥 Клиенты (<span id="clientCount">0</span>)</h2>
            <div style="display:flex;gap:6px">
                <input type="text" id="clientSearch" placeholder="Поиск..." oninput="filterAdminClients()" style="padding:8px 12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;color:#fff;font-size:.8rem;font-family:'PT Sans',sans-serif;width:160px">
                <button class="btn btn-primary" onclick="showSection('addclient',document.querySelectorAll('.tab')[1])">➕ Добавить</button>
            </div>
        </div>
        <div id="clientCards"></div>
    </div>

    <div id="addclient" class="section">
        <h2>➕ Новый клиент</h2>
        <div style="background:#141414;border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:24px">
            <form id="addClientForm">
                <div class="form-row">
                    <div class="form-group"><label class="form-label">ФИО *</label><input type="text" class="form-input" id="cName" placeholder="Иванов Иван Иванович" required></div>
                    <div class="form-group"><label class="form-label">Телефон *</label><input type="tel" class="form-input" id="cPhone" placeholder="+7 7XX XXX XX XX" required></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label class="form-label">ИИН</label><input type="text" class="form-input" id="cIin" placeholder="12 цифр"></div>
                    <div class="form-group"><label class="form-label">Город</label><input type="text" class="form-input" id="cCity" placeholder="Алматы"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Сумма потерь *</label><input type="text" class="form-input" id="cAmount" placeholder="2 500 000 ₸" required></div>
                    <div class="form-group"><label class="form-label">Платформа</label><input type="text" class="form-input" id="cPlatform" placeholder="Название платформы"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Статус</label><select class="form-select" id="cStatus"><option value="new">Новый</option><option value="process">В работе</option><option value="done">Завершено</option></select></div>
                    <div class="form-group"><label class="form-label">Консультант</label><input type="text" class="form-input" id="cConsultant" placeholder="ФИО консультанта"></div>
                </div>
                <div class="form-group"><label class="form-label">Описание ситуации</label><textarea class="form-input" id="cDesc" rows="3" placeholder="Опишите ситуацию клиента..."></textarea></div>
                <button type="submit" class="btn btn-primary" style="padding:12px 28px;font-size:.92rem">💾 Сохранить клиента</button>
            </form>
        </div>
    </div>

    <div id="apps" class="section"><h2>📋 Заявки с сайта (<span id="appCount">0</span>)</h2><div id="appsContent"></div></div>
    <div id="cases" class="section"><h2>📂 Дела</h2><div id="casesContent"></div></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
    <div class="modal">
        <button class="modal-close" onclick="closeModal()">✕ Закрыть</button>
        <div id="modalBody"></div>
    </div>
</div>

<script>
function login(){
    if(document.getElementById('loginPass').value==='1304'){
        document.getElementById('loginScreen').style.display='none';
        document.getElementById('adminPanel').style.display='block';
        loadAll();
    }else{document.getElementById('loginError').style.display='block'}
}
function logout(){location.reload()}
function showSection(id,btn){
    document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active')});
    document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
    document.getElementById(id).classList.add('active');
    if(btn)btn.classList.add('active');
}
function loadAll(){loadClients();loadApps();loadCases()}

function getClients(){return JSON.parse(localStorage.getItem('admin_clients')||'[]')}
function saveClients(c){localStorage.setItem('admin_clients',JSON.stringify(c))}

function loadClients(){
    var clients=getClients();
    document.getElementById('clientCount').textContent=clients.length;
    renderClientCards(clients);
}

function renderClientCards(clients){
    var h='';
    clients.forEach(function(c){
        var sc=c.status==='done'?'badge-done':c.status==='process'?'badge-process':'badge-new';
        var sl=c.status==='done'?'Завершено':c.status==='process'?'В работе':'Новый';
        h+='<div class="client-card" onclick="openModal(\''+c.id+'\')">';
        h+='<div class="client-top"><div class="client-name">'+esc(c.name)+'</div><span class="badge '+sc+'">'+sl+'</span></div>';
        h+='<div class="client-meta"><span>'+c.id+'</span>';
        if(c.phone)h+='<span>📱 '+esc(c.phone)+'</span>';
        if(c.amount)h+='<span style="color:#C8A000">💰 '+esc(c.amount)+'</span>';
        if(c.city)h+='<span>📍 '+esc(c.city)+'</span>';
        h+='</div></div>';
    });
    document.getElementById('clientCards').innerHTML=h||'<p style="text-align:center;color:#7a8ba3;padding:24px">Нет клиентов. Добавьте первого!</p>';
}

function filterAdminClients(){
    var q=document.getElementById('clientSearch').value.trim().toLowerCase();
    var clients=getClients();
    if(q)clients=clients.filter(function(c){return(c.name&&c.name.toLowerCase().indexOf(q)>=0)||(c.id&&c.id.toLowerCase().indexOf(q)>=0)||(c.phone&&c.phone.indexOf(q)>=0)});
    renderClientCards(clients);
}

function esc(s){var d=document.createElement('div');d.appendChild(document.createTextNode(s||''));return d.innerHTML}

/* ===== MODAL ===== */
function openModal(id){
    var clients=getClients();
    var c=clients.find(function(x){return x.id===id});
    if(!c)return;
    var sc=c.status==='done'?'badge-done':c.status==='process'?'badge-process':'badge-new';
    var sl=c.status==='done'?'Завершено':c.status==='process'?'В работе':'Новый';
    var initials=c.name.split(' ').map(function(w){return w[0]}).join('').substring(0,2);

    var h='<div class="modal-header">';
    h+='<div class="modal-avatar">'+initials+'</div>';
    h+='<div class="modal-info"><h2>'+esc(c.name)+'</h2><p>'+c.id+' · '+c.date+'</p></div>';
    h+='<span class="badge '+sc+'" style="margin-left:auto">'+sl+'</span></div>';

    h+='<div class="info-grid">';
    h+='<div class="info-item"><div class="label">Телефон</div><div class="value">📱 '+esc(c.phone||'—')+'</div></div>';
    h+='<div class="info-item"><div class="label">Сумма потерь</div><div class="value" style="color:#C8A000">💰 '+esc(c.amount||'—')+'</div></div>';
    h+='<div class="info-item"><div class="label">ИИН</div><div class="value">'+esc(c.iin||'—')+'</div></div>';
    h+='<div class="info-item"><div class="label">Город</div><div class="value">📍 '+esc(c.city||'—')+'</div></div>';
    h+='<div class="info-item"><div class="label">Платформа</div><div class="value">'+esc(c.platform||'—')+'</div></div>';
    h+='<div class="info-item"><div class="label">Консультант</div><div class="value">👨‍⚖️ '+esc(c.consultant||'Не назначен')+'</div></div>';
    h+='</div>';

    if(c.desc)h+='<div style="margin-bottom:16px;padding:12px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:10px"><div style="font-size:.72rem;color:#7a8ba3;margin-bottom:4px">ОПИСАНИЕ</div><div style="font-size:.88rem;line-height:1.6;white-space:pre-wrap">'+esc(c.desc)+'</div></div>';

    h+='<div style="font-size:.72rem;color:#555;margin-bottom:12px">📞 Контакт: <a href="tel:'+c.phone+'" style="color:#C8A000;text-decoration:none">'+esc(c.phone||'—')+'</a></div>';

    h+='<div style="font-size:.78rem;color:#7a8ba3;font-weight:600;margin-bottom:8px">ДЕЙСТВИЯ</div>';
    h+='<div class="action-grid">';
    h+='<button class="action-btn" onclick="modalChangeStatus(\''+c.id+'\')">📊 Статус</button>';
    h+='<button class="action-btn" onclick="modalEditField(\''+c.id+'\',\'name\',\'ФИО\',\''+esc(c.name)+'\')">✏️ ФИО</button>';
    h+='<button class="action-btn" onclick="modalEditField(\''+c.id+'\',\'phone\',\'Телефон\',\''+esc(c.phone||'')+'\')">📱 Телефон</button>';
    h+='<button class="action-btn" onclick="modalEditField(\''+c.id+'\',\'amount\',\'Сумма\',\''+esc(c.amount||'')+'\')">💰 Сумма</button>';
    h+='<button class="action-btn" onclick="modalEditField(\''+c.id+'\',\'city\',\'Город\',\''+esc(c.city||'')+'\')">📍 Город</button>';
    h+='<button class="action-btn" onclick="modalEditField(\''+c.id+'\',\'iin\',\'ИИН\',\''+esc(c.iin||'')+'\')">🆔 ИИН</button>';
    h+='<button class="action-btn" onclick="modalEditField(\''+c.id+'\',\'platform\',\'Платформа\',\''+esc(c.platform||'')+'\')">🏢 Платформа</button>';
    h+='<button class="action-btn" onclick="modalEditField(\''+c.id+'\',\'consultant\',\'Консультант\',\''+esc(c.consultant||'')+'\')">👨‍⚖️ Консультант</button>';
    h+='<button class="action-btn" onclick="modalEditDesc(\''+c.id+'\')">📝 Описание</button>';
    h+='<button class="action-btn" onclick="modalAddComment(\''+c.id+'\')">💬 Комментарий</button>';
    h+='<a href="/antifraud-kz/client/dashboard.html?id='+c.id+'" target="_blank" class="action-btn" style="text-decoration:none;color:#e8ecf4">👁 Дашборд</a>';
    h+='<button class="action-btn" onclick="modalDuplicate(\''+c.id+'\')">📋 Копировать</button>';
    h+='<button class="action-btn danger" onclick="modalDelete(\''+c.id+'\')">🗑 Удалить</button>';
    h+='</div>';

    document.getElementById('modalBody').innerHTML=h;
    document.getElementById('modal').classList.add('show');
}

function closeModal(){document.getElementById('modal').classList.remove('show')}

function modalChangeStatus(id){
    var clients=getClients();
    var c=clients.find(function(x){return x.id===id});
    if(!c)return;
    var current=c.status||'new';
    var body='<h2 style="font-family:Oswald;font-size:1.2rem;margin-bottom:16px">📊 Изменить статус</h2>';
    body+='<p style="color:#7a8ba3;font-size:.85rem;margin-bottom:16px">Клиент: <strong>'+esc(c.name)+'</strong></p>';
    body+='<div style="display:flex;flex-direction:column;gap:8px">';
    var opts=[
        {val:'new',label:'🆕 Новый',color:'#818cf8',desc:'Клиент только обратился'},
        {val:'process',label:'⏳ В работе',color:'#fbbf24',desc:'Специалист работает над делом'},
        {val:'done',label:'✅ Завершено',color:'#6ee7b7',desc:'Дело закрыто, средства возвращены'}
    ];
    opts.forEach(function(o){
        var active=current===o.val;
        body+='<button onclick="setStatus(\''+id+'\',\''+o.val+'\')" style="padding:14px 16px;background:'+(active?'rgba(255,255,255,.08)':'rgba(255,255,255,.02)')+';border:2px solid '+(active?o.color:'rgba(255,255,255,.06)')+';border-radius:12px;color:#fff;cursor:pointer;text-align:left;font-family:PT Sans,sans-serif;transition:all .2s" onmouseover="this.style.borderColor=\''+o.color+'\'" onmouseout="this.style.borderColor=\''+(active?o.color:'rgba(255,255,255,.06)')+'\'">';
        body+='<div style="font-weight:700;font-size:.95rem">'+o.label+'</div>';
        body+='<div style="font-size:.78rem;color:#7a8ba3;margin-top:2px">'+o.desc+'</div>';
        body+='</button>';
    });
    body+='</div>';
    body+='<button class="btn btn-secondary" onclick="openModal(\''+id+'\')" style="margin-top:12px;width:100%;justify-content:center;padding:10px">← Назад</button>';
    document.getElementById('modalBody').innerHTML=body;
}

function setStatus(id,newStatus){
    var clients=getClients();
    var c=clients.find(function(x){return x.id===id});
    if(c){c.status=newStatus;saveClients(clients)}
    openModal(id);
    loadClients();
}

function modalEditField(id,field,label,currentValue){
    var body='<h2 style="font-family:Oswald;font-size:1.2rem;margin-bottom:16px">✏️ Редактировать: '+label+'</h2>';
    body+='<div class="form-group"><label class="form-label">'+label+'</label>';
    body+='<input type="text" class="form-input" id="editFieldInput" value="'+esc(currentValue)+'"></div>';
    body+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
    body+='<button class="btn btn-primary" onclick="saveField(\''+id+'\',\''+field+'\')" style="padding:12px;justify-content:center">💾 Сохранить</button>';
    body+='<button class="btn btn-secondary" onclick="openModal(\''+id+'\')" style="padding:12px;justify-content:center">← Назад</button>';
    body+='</div>';
    document.getElementById('modalBody').innerHTML=body;
    document.getElementById('editFieldInput').focus();
    document.getElementById('editFieldInput').addEventListener('keydown',function(e){if(e.key==='Enter')saveField(id,field)});
}

function saveField(id,field){
    var val=document.getElementById('editFieldInput').value.trim();
    var clients=getClients();
    var c=clients.find(function(x){return x.id===id});
    if(c){c[field]=val;saveClients(clients)}
    openModal(id);
    loadClients();
}

function modalEditDesc(id){
    var clients=getClients();
    var c=clients.find(function(x){return x.id===id});
    if(!c)return;
    var body='<h2 style="font-family:Oswald;font-size:1.2rem;margin-bottom:16px">📝 Описание ситуации</h2>';
    body+='<div class="form-group"><label class="form-label">Описание</label>';
    body+='<textarea class="form-input" id="editDescInput" rows="6">'+esc(c.desc||'')+'</textarea></div>';
    body+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
    body+='<button class="btn btn-primary" onclick="saveDesc(\''+id+'\')" style="padding:12px;justify-content:center">💾 Сохранить</button>';
    body+='<button class="btn btn-secondary" onclick="openModal(\''+id+'\')" style="padding:12px;justify-content:center">← Назад</button>';
    body+='</div>';
    document.getElementById('modalBody').innerHTML=body;
    document.getElementById('editDescInput').focus();
}

function saveDesc(id){
    var val=document.getElementById('editDescInput').value.trim();
    var clients=getClients();
    var c=clients.find(function(x){return x.id===id});
    if(c){c.desc=val;saveClients(clients)}
    openModal(id);
    loadClients();
}

function modalAddComment(id){
    var body='<h2 style="font-family:Oswald;font-size:1.2rem;margin-bottom:16px">💬 Добавить комментарий</h2>';
    body+='<div class="form-group"><label class="form-label">Комментарий</label>';
    body+='<textarea class="form-input" id="commentInput" rows="4" placeholder="Текст комментария..."></textarea></div>';
    body+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
    body+='<button class="btn btn-success" onclick="addComment(\''+id+'\')" style="padding:12px;justify-content:center">💬 Добавить</button>';
    body+='<button class="btn btn-secondary" onclick="openModal(\''+id+'\')" style="padding:12px;justify-content:center">← Назад</button>';
    body+='</div>';
    document.getElementById('modalBody').innerHTML=body;
    document.getElementById('commentInput').focus();
}

function addComment(id){
    var val=document.getElementById('commentInput').value.trim();
    if(!val)return;
    var clients=getClients();
    var c=clients.find(function(x){return x.id===id});
    if(c){
        var now=new Date().toLocaleDateString('ru-RU')+' '+new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
        c.desc=(c.desc?c.desc+'\n':'')+'['+now+'] '+val;
        saveClients(clients);
    }
    openModal(id);
    loadClients();
}

function modalDelete(id){
    var clients=getClients();
    var c=clients.find(function(x){return x.id===id});
    if(!c)return;
    var body='<h2 style="font-family:Oswald;font-size:1.2rem;margin-bottom:16px;color:#fca5a5">🗑 Удалить клиента</h2>';
    body+='<p style="color:#7a8ba3;font-size:.88rem;margin-bottom:20px">Вы уверены что хотите удалить клиента <strong style="color:#fff">'+esc(c.name)+'</strong> ('+c.id+')?</p>';
    body+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
    body+='<button class="btn btn-danger" onclick="doDelete(\''+id+'\')" style="padding:12px;justify-content:center;font-size:.88rem">🗑 Да, удалить</button>';
    body+='<button class="btn btn-secondary" onclick="openModal(\''+id+'\')" style="padding:12px;justify-content:center;font-size:.88rem">← Отмена</button>';
    body+='</div>';
    document.getElementById('modalBody').innerHTML=body;
}

function doDelete(id){
    var clients=getClients().filter(function(c){return c.id!==id});
    saveClients(clients);
    closeModal();
    loadClients();
}

function modalDuplicate(id){
    var clients=getClients();
    var c=clients.find(function(x){return x.id===id});
    if(!c)return;
    var newId='AF-'+new Date().getFullYear()+'-'+String(clients.length+1).padStart(4,'0');
    var copy=JSON.parse(JSON.stringify(c));
    copy.id=newId;
    copy.name=copy.name+' (копия)';
    copy.date=new Date().toLocaleDateString('ru-RU');
    copy.status='new';
    clients.push(copy);
    saveClients(clients);
    openModal(newId);
    loadClients();
}

/* ===== ADD CLIENT ===== */
document.getElementById('addClientForm').addEventListener('submit',function(e){
    e.preventDefault();
    var clients=getClients();
    var id='AF-'+new Date().getFullYear()+'-'+String(clients.length+1).padStart(4,'0');
    var client={
        id:id,
        name:document.getElementById('cName').value,
        phone:document.getElementById('cPhone').value,
        iin:document.getElementById('cIin').value,
        city:document.getElementById('cCity').value,
        amount:document.getElementById('cAmount').value,
        platform:document.getElementById('cPlatform').value,
        status:document.getElementById('cStatus').value,
        consultant:document.getElementById('cConsultant').value,
        desc:document.getElementById('cDesc').value,
        date:new Date().toLocaleDateString('ru-RU')
    };
    clients.push(client);
    saveClients(clients);
    this.reset();
    showSection('clients',document.querySelectorAll('.tab')[0]);
    loadClients();
    alert('Клиент добавлен! ID: '+id);
    var msg='👤 НОВЫЙ КЛИЕНТ\n\nID: '+id+'\nФИО: '+client.name+'\nТелефон: '+client.phone+'\nСумма: '+client.amount+'\nПлатформа: '+(client.platform||'—')+'\nСтатус: '+client.status;
    fetch('https://api.telegram.org/bot8829750295:AAEdnt-7FPCVuVbgj6tgn7eC2_2LpY5VHCk/sendMessage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:'8471070560',text:msg})}).catch(function(){});
});

/* ===== APPS & CASES ===== */
function loadApps(){
    var apps=JSON.parse(localStorage.getItem('applications')||'[]');
    document.getElementById('appCount').textContent=apps.length;
    if(!apps.length){document.getElementById('appsContent').innerHTML='<p style="color:#7a8ba3;text-align:center;padding:24px">Нет заявок</p>';return}
    var typeNames={callback:'Звонок',consult:'Консультация',docs:'Документы',return:'Возврат',check:'Проверка',other:'Другое',invest:'Инвестиции',crypto:'Крипто',forex:'Forex',mfo:'МФО',credit:'Кредит'};
    var h='';
    apps.reverse().forEach(function(a){
        h+='<div style="background:rgba(26,26,26,.5);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:14px;margin-bottom:8px">';
        h+='<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">';
        h+='<div><strong>'+(a.name||a.fio||'—')+'</strong><div style="font-size:.75rem;color:#7a8ba3">'+(a.phone||'—')+' · '+(typeNames[a.type]||a.type||'—')+' · '+(a.amount||'—')+'</div></div>';
        h+='<button class="btn btn-primary" onclick="convertToClient(this)" data-app="'+esc(JSON.stringify(a))+'">➕ В клиенты</button>';
        h+='</div></div>';
    });
    document.getElementById('appsContent').innerHTML=h;
}

function convertToClient(btn){
    var a=JSON.parse(btn.getAttribute('data-app'));
    document.getElementById('cName').value=a.name||a.fio||'';
    document.getElementById('cPhone').value=a.phone||'';
    document.getElementById('cAmount').value=a.amount||'';
    document.getElementById('cPlatform').value=a.platform||'';
    document.getElementById('cDesc').value=a.details||a.text||'';
    showSection('addclient',document.querySelectorAll('.tab')[1]);
}

function loadCases(){
    var cases=JSON.parse(localStorage.getItem('cases')||'[]');
    if(!cases.length){document.getElementById('casesContent').innerHTML='<p style="color:#7a8ba3;text-align:center;padding:24px">Нет дел</p>';return}
    var h='';
    cases.forEach(function(c){
        h+='<div style="background:rgba(26,26,26,.5);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:14px;margin-bottom:8px">';
        h+='<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">';
        h+='<div><strong>'+c.client+'</strong><div style="font-size:.75rem;color:#7a8ba3">'+c.id+' · '+c.platform+'</div></div>';
        h+='<span class="badge badge-'+c.status+'">'+({new:'Новое',process:'В работе',done:'Завершено'}[c.status]||c.status)+'</span>';
        h+='</div></div>';
    });
    document.getElementById('casesContent').innerHTML=h;
}
</script>
