<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Админ-панель — Антифрод Центр</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{primary:'#B80018',gold:'#C8A000',dark:'#1A1A1A',darker:'#000000'},fontFamily:{heading:['Oswald','sans-serif'],body:['PT Sans','sans-serif']}}}}</script>
<style>
body{background:#000;color:#fff;font-family:'PT Sans',sans-serif}
.login-box{max-width:400px;margin:100px auto;padding:32px;background:#1A1A1A;border:1px solid rgba(255,255,255,.08);border-radius:16px}
.login-input{width:100%;padding:14px 16px;background:rgba(255,255,255,.03);border:1.5px solid rgba(255,255,255,.08);border-radius:10px;color:#fff;font-size:.95rem;margin-bottom:12px;font-family:'PT Sans',sans-serif}
.login-input:focus{border-color:rgba(184,0,24,.4);outline:none}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,#B80018,#C8A000);color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:.95rem}
.admin-panel{display:none}
.admin-top{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;background:#1A1A1A;border-bottom:1px solid rgba(255,255,255,.08);position:sticky;top:0;z-index:10}
.admin-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;padding:24px}
.admin-card{background:#1A1A1A;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:20px}
.admin-card h3{font-family:'Oswald',sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:12px}
.admin-table{width:100%;border-collapse:collapse;font-size:.85rem}
.admin-table th{text-align:left;padding:10px 12px;background:rgba(255,255,255,.02);border-bottom:1px solid rgba(255,255,255,.06);color:#7a8ba3;font-weight:600}
.admin-table td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.04)}
.badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:.72rem;font-weight:700}
.badge-new{background:rgba(99,102,241,.1);color:#818cf8}
.badge-process{background:rgba(245,158,11,.1);color:#fbbf24}
.badge-done{background:rgba(16,185,129,.1);color:#6ee7b7}
.btn-sm{padding:6px 12px;border-radius:6px;font-size:.78rem;font-weight:600;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:#B80018;color:#fff}
.btn-primary:hover{background:#d4001e}
.btn-secondary{background:rgba(255,255,255,.05);color:#e8ecf4;border:1px solid rgba(255,255,255,.1)}
.btn-secondary:hover{background:rgba(255,255,255,.1)}
.btn-danger{background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.2)}
.btn-danger:hover{background:rgba(239,68,68,.2)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:#1A1A1A;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:24px;width:90%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal-input{width:100%;padding:10px 14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:8px;color:#fff;font-size:.88rem;margin-bottom:8px;font-family:'PT Sans',sans-serif}
.modal-input:focus{border-color:rgba(184,0,24,.4);outline:none}
.modal-label{font-size:.78rem;color:#7a8ba3;margin-bottom:4px;display:block}
.tab{padding:8px 16px;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:600;transition:all .2s;background:rgba(255,255,255,.03);color:#7a8ba3}
.tab.active{background:rgba(184,0,24,.1);color:#fff;border:1px solid rgba(184,0,24,.3)}
.section{display:none}.section.active{display:block}
</style>
</head>
<body>
<!-- Login -->
<div id="loginScreen" class="login-box">
    <div style="text-align:center;margin-bottom:24px">
        <div style="width:60px;height:60px;background:linear-gradient(135deg,#B80018,#C8A000);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px"><svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg></div>
        <h2 style="font-family:'Oswald',sans-serif;font-size:1.5rem;font-weight:800">Админ-панель</h2>
        <p style="color:#7a8ba3;font-size:.85rem">Введите пароль для доступа</p>
    </div>
    <input type="password" class="login-input" id="loginPass" placeholder="Пароль" onkeydown="if(event.key==='Enter')login()">
    <p id="loginError" style="color:#fca5a5;font-size:.82rem;display:none;margin-bottom:12px">Неверный пароль</p>
    <button class="login-btn" onclick="login()">Войти</button>
    <p style="text-align:center;color:#7a8ba3;font-size:.72rem;margin-top:12px">Демо: admin123</p>
</div>

<!-- Admin Panel -->
<div id="adminPanel" class="admin-panel">
    <div class="admin-top">
        <div style="display:flex;align-items:center;gap:12px">
            <div style="width:36px;height:36px;background:linear-gradient(135deg,#B80018,#C8A000);border-radius:10px;display:flex;align-items:center;justify-content:center"><svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg></div>
            <span style="font-family:'Oswald',sans-serif;font-weight:700;font-size:1.1rem">АДМИН-ПАНЕЛЬ</span>
        </div>
        <button class="btn-sm btn-secondary" onclick="logout()">Выйти</button>
    </div>

    <div style="padding:16px 24px;display:flex;gap:8px;flex-wrap:wrap">
        <button class="tab active" onclick="showSection('apps',this)">📋 Заявки</button>
        <button class="tab" onclick="showSection('cases',this)">📂 Дела</button>
        <button class="tab" onclick="showSection('addcase',this)">➕ Новое дело</button>
    </div>

    <!-- Applications -->
    <div id="apps" class="section active">
        <div class="admin-grid">
            <div class="admin-card" style="grid-column:1/-1">
                <h3>📋 Заявки (<span id="appCount">0</span>)</h3>
                <div style="overflow-x:auto">
                    <table class="admin-table">
                        <thead><tr><th>Дата</th><th>ФИО</th><th>Телефон</th><th>Тип</th><th>Сумма</th><th>Действия</th></tr></thead>
                        <tbody id="appsTable"></tbody>
                    </table>
                </div>
                <button class="btn-sm btn-secondary" style="margin-top:12px" onclick="exportApps()">📥 Экспорт CSV</button>
            </div>
        </div>
    </div>

    <!-- Cases -->
    <div id="cases" class="section">
        <div class="admin-grid">
            <div class="admin-card" style="grid-column:1/-1">
                <h3>📂 Дела (<span id="caseCount">0</span>)</h3>
                <div style="overflow-x:auto">
                    <table class="admin-table">
                        <thead><tr><th>ID</th><th>Клиент</th><th>Платформа</th><th>Сумма</th><th>Статус</th><th>Действия</th></tr></thead>
                        <tbody id="casesTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Case -->
    <div id="addcase" class="section">
        <div class="admin-grid">
            <div class="admin-card" style="grid-column:1/-1;max-width:600px">
                <h3>➕ Новое дело</h3>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
                    <div><label class="modal-label">ID дела</label><input class="modal-input" id="newCaseId" placeholder="AF-2026-XXXX"></div>
                    <div><label class="modal-label">Клиент</label><input class="modal-input" id="newCaseClient" placeholder="Имя клиента"></div>
                    <div><label class="modal-label">Платформа</label><input class="modal-input" id="newCasePlatform" placeholder="Название"></div>
                    <div><label class="modal-label">Сумма</label><input class="modal-input" id="newCaseAmount" placeholder="2 500 000 ₸"></div>
                </div>
                <label class="modal-label" style="margin-top:8px">Статус</label>
                <select class="modal-input" id="newCaseStatus">
                    <option value="new">Новое</option>
                    <option value="process">В работе</option>
                    <option value="return">Возврат</option>
                    <option value="done">Завершено</option>
                </select>
                <button class="btn-sm btn-primary" style="margin-top:12px;padding:10px 20px" onclick="addCase()">Создать дело</button>
                <p style="font-size:.72rem;color:#7a8ba3;margin-top:8px">Ссылка на дело: <span id="caseLink">—</span></p>
            </div>
        </div>
    </div>
</div>

<script>
function login(){
    if(document.getElementById('loginPass').value==='admin123'){
        document.getElementById('loginScreen').style.display='none';
        document.getElementById('adminPanel').style.display='block';
        loadApps();loadCases();
    }else{
        document.getElementById('loginError').style.display='block';
    }
}
function logout(){location.reload()}
function showSection(id,btn){
    document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active')});
    document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
}
function loadApps(){
    var apps=JSON.parse(localStorage.getItem('applications')||'[]');
    document.getElementById('appCount').textContent=apps.length;
    var typeNames={invest:'Инвестиции',crypto:'Крипто',forex:'Forex',mfo:'МФО',credit:'Кредит',other:'Другое'};
    var h='';
    apps.reverse().forEach(function(a,i){
        h+='<tr><td>'+new Date(a.timestamp).toLocaleDateString('ru-RU')+'</td>';
        h+='<td><strong>'+a.fio+'</strong></td>';
        h+='<td>'+a.phone+'</td>';
        h+='<td>'+(typeNames[a.type]||a.type)+'</td>';
        h+='<td>'+(a.amount||'—')+'</td>';
        h+='<td><button class="btn-sm btn-secondary" onclick="alert('+JSON.stringify(JSON.stringify(a))+')">Детали</button></td></tr>';
    });
    document.getElementById('appsTable').innerHTML=h||'<tr><td colspan="6" style="text-align:center;color:#7a8ba3;padding:20px">Нет заявок</td></tr>';
}
function loadCases(){
    var cases=JSON.parse(localStorage.getItem('cases')||'[]');
    document.getElementById('caseCount').textContent=cases.length;
    var statusNames={new:'Новое',process:'В работе',return:'Возврат',done:'Завершено'};
    var statusClasses={new:'badge-new',process:'badge-process',return:'badge-done',done:'badge-done'};
    var h='';
    cases.forEach(function(c){
        h+='<tr><td><strong>'+c.id+'</strong></td>';
        h+='<td>'+c.client+'</td>';
        h+='<td>'+c.platform+'</td>';
        h+='<td>'+c.amount+'</td>';
        h+='<td><span class="badge '+(statusClasses[c.status]||'')+'">'+(statusNames[c.status]||c.status)+'</span></td>';
        h+='<td><button class="btn-sm btn-secondary" onclick="window.open(\'/antifraud-kz/case/?id='+c.id+'\',\'_blank\')">🔗 Ссылка</button></td></tr>';
    });
    document.getElementById('casesTable').innerHTML=h||'<tr><td colspan="6" style="text-align:center;color:#7a8ba3;padding:20px">Нет дел</td></tr>';
}
function addCase(){
    var id=document.getElementById('newCaseId').value.trim();
    var client=document.getElementById('newCaseClient').value.trim();
    var platform=document.getElementById('newCasePlatform').value.trim();
    var amount=document.getElementById('newCaseAmount').value.trim();
    var status=document.getElementById('newCaseStatus').value;
    if(!id||!client){alert('Заполните ID и клиента');return}
    var cases=JSON.parse(localStorage.getItem('cases')||'[]');
    cases.push({id:id,client:client,platform:platform,amount:amount,status:status,timeline:[]});
    localStorage.setItem('cases',JSON.stringify(cases));
    document.getElementById('caseLink').innerHTML='<a href="/antifraud-kz/case/?id='+id+'" target="_blank" style="color:#B80018">/antifraud-kz/case/?id='+id+'</a>';
    loadCases();
    document.getElementById('newCaseId').value='';
    document.getElementById('newCaseClient').value='';
    document.getElementById('newCasePlatform').value='';
    document.getElementById('newCaseAmount').value='';
    alert('Дело создано!');
}
function exportApps(){
    var apps=JSON.parse(localStorage.getItem('applications')||'[]');
    if(!apps.length){alert('Нет данных');return}
    var csv='Дата,ФИО,Телефон,Тип,Сумма,Когда\n';
    apps.forEach(function(a){csv+='"'+new Date(a.timestamp).toLocaleDateString('ru-RU')+'","'+a.fio+'","'+a.phone+'","'+a.type+'","'+a.amount+'","'+a.time+'"\n'});
    var blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
    var link=document.createElement('a');link.href=URL.createObjectURL(blob);
    link.download='applications_'+new Date().toISOString().split('T')[0]+'.csv';
    link.click();
}
</script>
<script src="/antifraud-kz/assets/js/nav.js"></script>
</body>
</html>
