<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Админ-панель — Антифрод Центр</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#fff;font-family:'PT Sans',sans-serif}
.login-box{max-width:400px;margin:100px auto;padding:32px;background:#1A1A1A;border:1px solid rgba(255,255,255,.08);border-radius:16px}
.login-input{width:100%;padding:14px 16px;background:rgba(255,255,255,.03);border:1.5px solid rgba(255,255,255,.08);border-radius:10px;color:#fff;font-size:.95rem;margin-bottom:12px;font-family:'PT Sans',sans-serif}
.login-input:focus{border-color:rgba(184,0,24,.4);outline:none}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,#B80018,#C8A000);color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:.95rem}
.admin-panel{display:none}
.admin-top{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:#111;border-bottom:1px solid rgba(255,255,255,.06);position:sticky;top:0;z-index:10}
.tabs{display:flex;gap:6px;padding:12px 20px;background:#0a0a0a;border-bottom:1px solid rgba(255,255,255,.06);flex-wrap:wrap}
.tab{padding:8px 14px;border-radius:8px;cursor:pointer;font-size:.82rem;font-weight:600;transition:all .2s;background:rgba(255,255,255,.03);color:#7a8ba3;border:1px solid transparent}
.tab.active{background:rgba(184,0,24,.12);color:#fff;border-color:rgba(184,0,24,.3)}
.section{display:none;padding:20px}.section.active{display:block}
.section h2{font-family:'Oswald',sans-serif;font-size:1.3rem;font-weight:700;margin-bottom:16px}
.badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:.68rem;font-weight:700}
.badge-new{background:rgba(99,102,241,.1);color:#818cf8;border:1px solid rgba(99,102,241,.2)}
.badge-process{background:rgba(245,158,11,.1);color:#fbbf24;border:1px solid rgba(245,158,11,.2)}
.badge-done{background:rgba(16,185,129,.1);color:#6ee7b7;border:1px solid rgba(16,185,129,.2)}
.btn{padding:8px 14px;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;border:none;transition:all .2s;font-family:'PT Sans',sans-serif;display:inline-flex;align-items:center;gap:4px}
.btn-primary{background:#B80018;color:#fff}.btn-primary:hover{background:#d4001e}
.btn-secondary{background:rgba(255,255,255,.05);color:#e8ecf4;border:1px solid rgba(255,255,255,.08)}.btn-secondary:hover{background:rgba(255,255,255,.1)}
.btn-danger{background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.2)}.btn-danger:hover{background:rgba(239,68,68,.2)}
.btn-success{background:rgba(16,185,129,.1);color:#6ee7b7;border:1px solid rgba(16,185,129,.2)}.btn-success:hover{background:rgba(16,185,129,.2)}
.fg{margin-bottom:12px}
.fg label{font-size:.78rem;color:#7a8ba3;margin-bottom:4px;display:block;font-weight:600}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 14px;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);border-radius:8px;color:#fff;font-size:.88rem;font-family:'PT Sans',sans-serif}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:rgba(184,0,24,.4);outline:none}
.fg select option{background:#1A1A1A;color:#fff}
.fg textarea{min-height:80px;resize:vertical}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.client-card{background:rgba(26,26,26,.6);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px;margin-bottom:8px;cursor:pointer;transition:all .3s}
.client-card:hover{border-color:rgba(184,0,24,.3);transform:translateY(-1px)}
.client-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.client-name{font-weight:700;font-size:.95rem}
.client-meta{display:flex;gap:10px;font-size:.75rem;color:#7a8ba3;flex-wrap:wrap}
.modal-bg{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);overflow-y:auto;padding:20px}
.modal-bg.show{display:flex;align-items:flex-start;justify-content:center}
.modal{width:100%;max-width:640px;margin:40px auto;background:#141414;border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:28px;position:relative;animation:mIn .3s ease}
@keyframes mIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.m-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:6px 12px;color:#7a8ba3;cursor:pointer;font-size:.8rem}
.m-close:hover{background:rgba(255,255,255,.1);color:#fff}
.m-head{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.m-avatar{width:52px;height:52px;background:linear-gradient(135deg,#B80018,#C8A000);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:700;color:#fff;font-family:'Oswald',sans-serif;flex-shrink:0}
.m-info h2{font-family:'Oswald',sans-serif;font-size:1.3rem;font-weight:700}
.m-info p{font-size:.82rem;color:#7a8ba3}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.ii{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:10px;padding:12px}
.ii .l{font-size:.68rem;color:#7a8ba3;margin-bottom:2px;text-transform:uppercase;letter-spacing:.3px}
.ii .v{font-weight:700;font-size:.9rem}
.ag{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px}
.ab{padding:10px;border-radius:10px;font-size:.78rem;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:#e8ecf4;font-family:'PT Sans',sans-serif;transition:all .2s;text-align:center;text-decoration:none;display:block}
.ab:hover{background:rgba(184,0,24,.1);border-color:rgba(184,0,24,.3);color:#fff}
.ab.d:hover{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.3);color:#fca5a5}
.sopt{padding:14px 16px;background:rgba(255,255,255,.02);border:2px solid rgba(255,255,255,.06);border-radius:12px;color:#fff;cursor:pointer;text-align:left;font-family:'PT Sans',sans-serif;transition:all .2s;width:100%;margin-bottom:8px}
.sopt:hover{border-color:rgba(184,0,24,.4)}
.sopt.sel{border-color:#C8A000;background:rgba(200,160,0,.06)}
.sopt strong{display:block;font-size:.95rem;margin-bottom:2px}
.sopt span{font-size:.78rem;color:#7a8ba3}
@media(max-width:600px){.fg-row,.ig{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="loginScreen" class="login-box">
    <div style="text-align:center;margin-bottom:24px">
        <div style="width:60px;height:60px;background:linear-gradient(135deg,#B80018,#C8A000);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px"><svg style="width:28px;height:28px;color:#fff" fill="currentColor" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg></div>
        <h2 style="font-family:'Oswald',sans-serif;font-size:1.3rem;font-weight:700">Админ-панель</h2>
        <p style="color:#7a8ba3;font-size:.85rem">Введите пароль</p>
    </div>
    <input type="password" class="login-input" id="loginPass" placeholder="Пароль" onkeydown="if(event.key==='Enter')doLogin()">
    <p id="loginErr" style="color:#fca5a5;font-size:.82rem;display:none;margin-bottom:12px">Неверный пароль</p>
    <button class="login-btn" onclick="doLogin()">Войти</button>
</div>

<div id="adminPanel" class="admin-panel">
    <div class="admin-top">
        <div style="display:flex;align-items:center;gap:10px">
            <div style="width:32px;height:32px;background:linear-gradient(135deg,#B80018,#C8A000);border-radius:8px;display:flex;align-items:center;justify-content:center"><svg style="width:18px;height:18px;color:#fff" fill="currentColor" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg></div>
            <span style="font-family:'Oswald',sans-serif;font-weight:700;font-size:1rem">АДМИН</span>
        </div>
        <button class="btn btn-secondary" onclick="location.reload()">Выйти</button>
    </div>
    <div class="tabs">
        <button class="tab active" data-tab="clients" onclick="showTab(this)">👥 Клиенты</button>
        <button class="tab" data-tab="addclient" onclick="showTab(this)">➕ Новый</button>
        <button class="tab" data-tab="apps" onclick="showTab(this)">📋 Заявки</button>
        <button class="tab" data-tab="cases" onclick="showTab(this)">📂 Дела</button>
    </div>

    <div id="sec-clients" class="section active">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
            <h2>👥 Клиенты (<span id="cnt">0</span>)</h2>
            <div style="display:flex;gap:6px">
                <input type="text" id="search" placeholder="Поиск..." oninput="doSearch()" style="padding:8px 12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;color:#fff;font-size:.8rem;width:160px">
                <button class="btn btn-primary" onclick="document.querySelector('[data-tab=addclient]').click()">➕ Добавить</button>
            </div>
        </div>
        <div id="cards"></div>
    </div>

    <div id="sec-addclient" class="section">
        <h2>➕ Новый клиент</h2>
        <div style="background:#141414;border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:24px">
            <form id="addForm">
                <div class="fg-row"><div class="fg"><label>ФИО *</label><input id="f_name" required></div><div class="fg"><label>Телефон *</label><input id="f_phone" required></div></div>
                <div class="fg-row"><div class="fg"><label>ИИН</label><input id="f_iin"></div><div class="fg"><label>Город</label><input id="f_city"></div></div>
                <div class="fg-row"><div class="fg"><label>Сумма *</label><input id="f_amount" required></div><div class="fg"><label>Платформа</label><input id="f_platform"></div></div>
                <div class="fg-row"><div class="fg"><label>Статус</label><select id="f_status"><option value="new">Новый</option><option value="process">В работе</option><option value="done">Завершено</option></select></div><div class="fg"><label>Консультант</label><input id="f_consultant"></div></div>
                <div class="fg"><label>Описание</label><textarea id="f_desc" rows="3"></textarea></div>
                <button type="submit" class="btn btn-primary" style="padding:12px 28px;font-size:.92rem">💾 Сохранить</button>
            </form>
        </div>
    </div>

    <div id="sec-apps" class="section"><h2>📋 Заявки (<span id="cnt2">0</span>)</h2><div id="appsBox"></div></div>
    <div id="sec-cases" class="section"><h2>📂 Дела</h2><div id="casesBox"></div></div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modal" onclick="if(event.target===this)closeM()">
    <div class="modal"><button class="m-close" onclick="closeM()">✕</button><div id="mb"></div></div>
</div>

<script>
var CID='';

function doLogin(){
    if(document.getElementById('loginPass').value==='1304'){
        document.getElementById('loginScreen').style.display='none';
        document.getElementById('adminPanel').style.display='block';
        loadAll();
    }else{document.getElementById('loginErr').style.display='block'}
}

function showTab(btn){
    document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active')});
    document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
    btn.classList.add('active');
    document.getElementById('sec-'+btn.getAttribute('data-tab')).classList.add('active');
}

function gC(){return JSON.parse(localStorage.getItem('admin_clients')||'[]')}
function sC(d){localStorage.setItem('admin_clients',JSON.stringify(d))}
function esc(s){var d=document.createElement('div');d.appendChild(document.createTextNode(s||''));return d.innerHTML}

function loadAll(){renderCards();loadApps();loadCases()}

/* ===== CARDS ===== */
function renderCards(list){
    if(!list)list=gC();
    document.getElementById('cnt').textContent=list.length;
    var h='';
    list.forEach(function(c){
        var sc=c.status==='done'?'badge-done':c.status==='process'?'badge-process':'badge-new';
        var sl=c.status==='done'?'Завершено':c.status==='process'?'В работе':'Новый';
        h+='<div class="client-card" onclick="openM(\''+c.id+'\')">';
        h+='<div class="client-top"><div class="client-name">'+esc(c.name)+'</div><span class="badge '+sc+'">'+sl+'</span></div>';
        h+='<div class="client-meta"><span>'+c.id+'</span>';
        if(c.phone)h+='<span>📱 '+esc(c.phone)+'</span>';
        if(c.amount)h+='<span style="color:#C8A000">💰 '+esc(c.amount)+'</span>';
        if(c.city)h+='<span>📍 '+esc(c.city)+'</span>';
        h+='</div></div>';
    });
    document.getElementById('cards').innerHTML=h||'<p style="text-align:center;color:#7a8ba3;padding:24px">Нет клиентов</p>';
}

function doSearch(){
    var q=document.getElementById('search').value.toLowerCase().trim();
    var list=gC();
    if(q)list=list.filter(function(c){return(c.name&&c.name.toLowerCase().indexOf(q)>=0)||(c.id&&c.id.toLowerCase().indexOf(q)>=0)||(c.phone&&c.phone.indexOf(q)>=0)});
    renderCards(list);
}

/* ===== MODAL ===== */
function openM(id){
    CID=id;
    var c=gC().find(function(x){return x.id===id});
    if(!c)return;
    var sc=c.status==='done'?'badge-done':c.status==='process'?'badge-process':'badge-new';
    var sl=c.status==='done'?'Завершено':c.status==='process'?'В работе':'Новый';
    var ini=c.name.split(' ').map(function(w){return w[0]}).join('').substring(0,2);

    var h='<div class="m-head"><div class="m-avatar">'+ini+'</div><div class="m-info"><h2>'+esc(c.name)+'</h2><p>'+c.id+' · '+c.date+'</p></div><span class="badge '+sc+'" style="margin-left:auto">'+sl+'</span></div>';
    h+='<div class="ig">';
    h+='<div class="ii"><div class="l">Телефон</div><div class="v">📱 '+esc(c.phone||'—')+'</div></div>';
    h+='<div class="ii"><div class="l">Сумма</div><div class="v" style="color:#C8A000">💰 '+esc(c.amount||'—')+'</div></div>';
    h+='<div class="ii"><div class="l">ИИН</div><div class="v">'+esc(c.iin||'—')+'</div></div>';
    h+='<div class="ii"><div class="l">Город</div><div class="v">📍 '+esc(c.city||'—')+'</div></div>';
    h+='<div class="ii"><div class="l">Платформа</div><div class="v">'+esc(c.platform||'—')+'</div></div>';
    h+='<div class="ii"><div class="l">Консультант</div><div class="v">👨‍⚖️ '+esc(c.consultant||'Не назначен')+'</div></div>';
    h+='</div>';
    if(c.desc)h+='<div style="margin-bottom:16px;padding:12px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:10px"><div style="font-size:.72rem;color:#7a8ba3;margin-bottom:4px">ОПИСАНИЕ</div><div style="font-size:.88rem;line-height:1.6;white-space:pre-wrap">'+esc(c.desc)+'</div></div>';
    h+='<div style="font-size:.72rem;color:#555;margin-bottom:14px">📞 <a href="tel:'+esc(c.phone||'')+'" style="color:#C8A000;text-decoration:none">'+esc(c.phone||'—')+'</a></div>';
    h+='<div style="font-size:.78rem;color:#7a8ba3;font-weight:600;margin-bottom:8px">ДЕЙСТВИЯ</div>';
    h+='<div class="ag">';
    h+='<button class="ab" onclick="mStatus()">📊 Статус</button>';
    h+='<button class="ab" onclick="mEdit(\'name\')">✏️ ФИО</button>';
    h+='<button class="ab" onclick="mEdit(\'phone\')">📱 Телефон</button>';
    h+='<button class="ab" onclick="mEdit(\'amount\')">💰 Сумма</button>';
    h+='<button class="ab" onclick="mEdit(\'city\')">📍 Город</button>';
    h+='<button class="ab" onclick="mEdit(\'iin\')">🆔 ИИН</button>';
    h+='<button class="ab" onclick="mEdit(\'platform\')">🏢 Платформа</button>';
    h+='<button class="ab" onclick="mEdit(\'consultant\')">👨‍⚖️ Консультант</button>';
    h+='<button class="ab" onclick="mDesc()">📝 Описание</button>';
    h+='<button class="ab" onclick="mComment()">💬 Комментарий</button>';
    h+='<a class="ab" href="/antifraud-kz/client/dashboard.html?id='+c.id+'" target="_blank">👁 Дашборд</a>';
    h+='<button class="ab" onclick="mDup()">📋 Копировать</button>';
    h+='<button class="ab d" onclick="mDel()">🗑 Удалить</button>';
    h+='</div>';
    document.getElementById('mb').innerHTML=h;
    document.getElementById('modal').classList.add('show');
}

function closeM(){document.getElementById('modal').classList.remove('show');CID=''}

function getC(){return gC().find(function(x){return x.id===CID})}
function upd(fn){var cl=gC();var c=cl.find(function(x){return x.id===CID});if(c){fn(c);sC(cl)}renderCards();openM(CID)}

/* Status */
function mStatus(){
    var c=getC();if(!c)return;
    var cur=c.status||'new';
    var opts=[{v:'new',l:'🆕 Новый',d:'Клиент только обратился',cl:'#818cf8'},{v:'process',l:'⏳ В работе',d:'Специалист работает',cl:'#fbbf24'},{v:'done',l:'✅ Завершено',d:'Дело закрыто',cl:'#6ee7b7'}];
    var h='<h2 style="font-family:Oswald;font-size:1.2rem;margin-bottom:16px">📊 Статус</h2>';
    h+='<p style="color:#7a8ba3;margin-bottom:14px">'+esc(c.name)+'</p>';
    opts.forEach(function(o){
        h+='<button class="sopt'+(cur===o.v?' sel':'')+'" onclick="doStatus(\''+o.v+'\')"><strong>'+o.l+'</strong><span>'+o.d+'</span></button>';
    });
    h+='<button class="btn btn-secondary" onclick="openM(\''+CID+'\')" style="margin-top:8px;width:100%;justify-content:center">← Назад</button>';
    document.getElementById('mb').innerHTML=h;
}
function doStatus(v){upd(function(c){c.status=v})}

/* Edit field */
function mEdit(field){
    var c=getC();if(!c)return;
    var labels={name:'ФИО',phone:'Телефон',amount:'Сумма',city:'Город',iin:'ИИН',platform:'Платформа',consultant:'Консультант'};
    var h='<h2 style="font-family:Oswald;font-size:1.2rem;margin-bottom:16px">✏️ '+labels[field]+'</h2>';
    h+='<p style="color:#7a8ba3;margin-bottom:14px">Клиент: '+esc(c.name)+'</p>';
    h+='<div class="fg"><label>'+labels[field]+'</label><input id="efi" value="'+esc(c[field]||'')+'"></div>';
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
    h+='<button class="btn btn-primary" onclick="doEdit(\''+field+'\')" style="padding:12px;justify-content:center">💾 Сохранить</button>';
    h+='<button class="btn btn-secondary" onclick="openM(\''+CID+'\')" style="padding:12px;justify-content:center">← Назад</button>';
    h+='</div>';
    document.getElementById('mb').innerHTML=h;
    var inp=document.getElementById('efi');
    inp.focus();
    inp.select();
    inp.onkeydown=function(e){if(e.key==='Enter')doEdit(field)};
}
function doEdit(field){var v=document.getElementById('efi').value.trim();upd(function(c){c[field]=v})}

/* Description */
function mDesc(){
    var c=getC();if(!c)return;
    var h='<h2 style="font-family:Oswald;font-size:1.2rem;margin-bottom:16px">📝 Описание</h2>';
    h+='<p style="color:#7a8ba3;margin-bottom:14px">'+esc(c.name)+'</p>';
    h+='<div class="fg"><label>Описание ситуации</label><textarea id="edi" rows="8">'+esc(c.desc||'')+'</textarea></div>';
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
    h+='<button class="btn btn-primary" onclick="doDesc()" style="padding:12px;justify-content:center">💾 Сохранить</button>';
    h+='<button class="btn btn-secondary" onclick="openM(\''+CID+'\')" style="padding:12px;justify-content:center">← Назад</button>';
    h+='</div>';
    document.getElementById('mb').innerHTML=h;
    document.getElementById('edi').focus();
}
function doDesc(){var v=document.getElementById('edi').value.trim();upd(function(c){c.desc=v})}

/* Comment */
function mComment(){
    var h='<h2 style="font-family:Oswald;font-size:1.2rem;margin-bottom:16px">💬 Комментарий</h2>';
    h+='<p style="color:#7a8ba3;margin-bottom:14px">'+esc(getC().name)+'</p>';
    h+='<div class="fg"><label>Текст</label><textarea id="cmi" rows="4" placeholder="Комментарий..."></textarea></div>';
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
    h+='<button class="btn btn-success" onclick="doComment()" style="padding:12px;justify-content:center">💬 Добавить</button>';
    h+='<button class="btn btn-secondary" onclick="openM(\''+CID+'\')" style="padding:12px;justify-content:center">← Назад</button>';
    h+='</div>';
    document.getElementById('mb').innerHTML=h;
    document.getElementById('cmi').focus();
}
function doComment(){
    var v=document.getElementById('cmi').value.trim();if(!v)return;
    var now=new Date().toLocaleDateString('ru-RU')+' '+new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
    upd(function(c){c.desc=(c.desc?c.desc+'\n':'')+'['+now+'] '+v});
}

/* Delete */
function mDel(){
    var c=getC();if(!c)return;
    var h='<h2 style="font-family:Oswald;font-size:1.2rem;margin-bottom:16px;color:#fca5a5">🗑 Удалить?</h2>';
    h+='<p style="color:#7a8ba3;margin-bottom:20px">Удалить <strong style="color:#fff">'+esc(c.name)+'</strong> ('+c.id+')?</p>';
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
    h+='<button class="btn btn-danger" onclick="doDel()" style="padding:12px;justify-content:center;font-size:.88rem">🗑 Да, удалить</button>';
    h+='<button class="btn btn-secondary" onclick="openM(\''+CID+'\')" style="padding:12px;justify-content:center;font-size:.88rem">← Отмена</button>';
    h+='</div>';
    document.getElementById('mb').innerHTML=h;
}
function doDel(){sC(gC().filter(function(c){return c.id!==CID}));closeM();renderCards()}

/* Duplicate */
function mDup(){
    var cl=gC();var c=cl.find(function(x){return x.id===CID});if(!c)return;
    var nid='AF-'+new Date().getFullYear()+'-'+String(cl.length+1).padStart(4,'0');
    var cp=JSON.parse(JSON.stringify(c));cp.id=nid;cp.name+=' (копия)';cp.date=new Date().toLocaleDateString('ru-RU');cp.status='new';
    cl.push(cp);sC(cl);renderCards();openM(nid);
}

/* ===== ADD CLIENT ===== */
document.getElementById('addForm').onsubmit=function(e){
    e.preventDefault();
    var cl=gC();var id='AF-'+new Date().getFullYear()+'-'+String(cl.length+1).padStart(4,'0');
    var c={id:id,name:f('f_name'),phone:f('f_phone'),iin:f('f_iin'),city:f('f_city'),amount:f('f_amount'),platform:f('f_platform'),status:gv('f_status'),consultant:f('f_consultant'),desc:f('f_desc'),date:new Date().toLocaleDateString('ru-RU')};
    cl.push(c);sC(cl);this.reset();
    document.querySelector('[data-tab=clients]').click();
    renderCards();
    alert('Клиент добавлен! ID: '+id);
    fetch('https://api.telegram.org/bot8829750295:AAEdnt-7FPCVuVbgj6tgn7eC2_2LpY5VHCk/sendMessage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:'8471070560',text:'👤 НОВЫЙ КЛИЕНТ\nID: '+id+'\nФИО: '+c.name+'\nТелефон: '+c.phone+'\nСумма: '+c.amount})}).catch(function(){});
};
function f(id){return document.getElementById(id).value.trim()}
function gv(id){return document.getElementById(id).value}

/* ===== APPS & CASES ===== */
function loadApps(){
    var apps=JSON.parse(localStorage.getItem('applications')||'[]');
    document.getElementById('cnt2').textContent=apps.length;
    if(!apps.length){document.getElementById('appsBox').innerHTML='<p style="color:#7a8ba3;text-align:center;padding:24px">Нет заявок</p>';return}
    var tn={callback:'Звонок',consult:'Консультация',docs:'Документы',return:'Возврат',check:'Проверка',other:'Другое',invest:'Инвестиции',crypto:'Крипто',forex:'Forex',mfo:'МФО',credit:'Кредит'};
    var h='';apps.reverse().forEach(function(a){
        h+='<div style="background:rgba(26,26,26,.5);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">';
        h+='<div><strong>'+esc(a.name||a.fio||'—')+'</strong><div style="font-size:.75rem;color:#7a8ba3">'+esc(a.phone||'—')+' · '+(tn[a.type]||a.type||'—')+'</div></div>';
        h+='<button class="btn btn-primary" onclick="toAdd(this)" data-n="'+esc(a.name||a.fio||'')+'" data-p="'+esc(a.phone||'')+'" data-a="'+esc(a.amount||'')+'" data-pl="'+esc(a.platform||'')+'" data-d="'+esc(a.details||a.text||'')+'">➕ В клиенты</button>';
        h+='</div>';
    });
    document.getElementById('appsBox').innerHTML=h;
}
function toAdd(b){
    document.getElementById('f_name').value=b.dataset.n;
    document.getElementById('f_phone').value=b.dataset.p;
    document.getElementById('f_amount').value=b.dataset.a;
    document.getElementById('f_platform').value=b.dataset.pl;
    document.getElementById('f_desc').value=b.dataset.d;
    document.querySelector('[data-tab=addclient]').click();
}

function loadCases(){
    var cases=JSON.parse(localStorage.getItem('cases')||'[]');
    if(!cases.length){document.getElementById('casesBox').innerHTML='<p style="color:#7a8ba3;text-align:center;padding:24px">Нет дел</p>';return}
    var h='';cases.forEach(function(c){
        h+='<div style="background:rgba(26,26,26,.5);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">';
        h+='<div><strong>'+esc(c.client)+'</strong><div style="font-size:.75rem;color:#7a8ba3">'+c.id+' · '+esc(c.platform)+'</div></div>';
        h+='<span class="badge badge-'+c.status+'">'+({new:'Новое',process:'В работе',done:'Завершено'}[c.status]||c.status)+'</span></div>';
    });
    document.getElementById('casesBox').innerHTML=h;
}
</script>
