<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Админ-панель — Антифрод Центр</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{primary:'#B80018',gold:'#C8A000',dark:'#1A1A1A',darker:'#000000'},fontFamily:{heading:['Oswald','sans-serif'],body:['PT Sans','sans-serif']}}}}</script>
<link rel="stylesheet" href="/antifraud-kz/assets/css/styles.css">
<style>
body{background:#000;color:#fff;font-family:'PT Sans',sans-serif;margin:0}
.login-box{max-width:400px;margin:100px auto;padding:32px;background:#1A1A1A;border:1px solid rgba(255,255,255,.08);border-radius:16px}
.login-input{width:100%;padding:14px 16px;background:rgba(255,255,255,.03);border:1.5px solid rgba(255,255,255,.08);border-radius:10px;color:#fff;font-size:.95rem;margin-bottom:12px;font-family:'PT Sans',sans-serif}
.login-input:focus{border-color:rgba(184,0,24,.4);outline:none}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,#B80018,#C8A000);color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:.95rem}
.admin-panel{display:none}
.admin-top{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;background:#1A1A1A;border-bottom:1px solid rgba(255,255,255,.08);position:sticky;top:0;z-index:10}
.tabs{display:flex;gap:8px;padding:16px 24px;background:#0a0a0a;border-bottom:1px solid rgba(255,255,255,.06);flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:600;transition:all .2s;background:rgba(255,255,255,.03);color:#7a8ba3;border:1px solid transparent}
.tab.active{background:rgba(184,0,24,.1);color:#fff;border-color:rgba(184,0,24,.3)}
.tab:hover:not(.active){color:#fff}
.section{display:none;padding:24px}.section.active{display:block}
.section h2{font-family:'Oswald',sans-serif;font-size:1.5rem;font-weight:700;margin-bottom:20px}
.admin-table{width:100%;border-collapse:collapse;font-size:.85rem;background:#1A1A1A;border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,.06)}
.admin-table th{text-align:left;padding:12px 16px;background:rgba(255,255,255,.02);border-bottom:1px solid rgba(255,255,255,.06);color:#7a8ba3;font-weight:600;font-size:.78rem;text-transform:uppercase;letter-spacing:.5px}
.admin-table td{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.04)}
.badge{display:inline-block;padding:4px 12px;border-radius:100px;font-size:.72rem;font-weight:700}
.badge-new{background:rgba(99,102,241,.1);color:#818cf8;border:1px solid rgba(99,102,241,.2)}
.badge-process{background:rgba(245,158,11,.1);color:#fbbf24;border:1px solid rgba(245,158,11,.2)}
.badge-done{background:rgba(16,185,129,.1);color:#6ee7b7;border:1px solid rgba(16,185,129,.2)}
.btn{padding:8px 16px;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;border:none;transition:all .2s;font-family:'PT Sans',sans-serif}
.btn-primary{background:#B80018;color:#fff}.btn-primary:hover{background:#d4001e}
.btn-secondary{background:rgba(255,255,255,.05);color:#e8ecf4;border:1px solid rgba(255,255,255,.08)}.btn-secondary:hover{background:rgba(255,255,255,.1)}
.btn-danger{background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.2)}
.form-group{margin-bottom:14px}
.form-label{font-size:.82rem;color:#7a8ba3;margin-bottom:6px;display:block}
.form-input{width:100%;padding:12px 16px;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);border-radius:10px;color:#fff;font-size:.92rem;font-family:'PT Sans',sans-serif}
.form-input:focus{border-color:rgba(184,0,24,.4);outline:none}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:#1A1A1A;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:20px;margin-bottom:16px}
.card h3{font-family:'Oswald',sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:12px}
@media(max-width:600px){.form-row{grid-template-columns:1fr}.admin-table{font-size:.75rem}.admin-table th,.admin-table td{padding:8px}}
</style>
</head>
<body>
<!-- Login -->
<div id="loginScreen" class="login-box">
    <div style="text-align:center;margin-bottom:24px">
        <div style="width:60px;height:60px;background:linear-gradient(135deg,#B80018,#C8A000);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px"><svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg></div>
        <h2 style="font-family:'Oswald',sans-serif;font-size:1.3rem;font-weight:700">Админ-панель</h2>
        <p style="color:#7a8ba3;font-size:.85rem">Введите пароль для доступа</p>
    </div>
    <input type="password" class="login-input" id="loginPass" placeholder="Пароль" onkeydown="if(event.key==='Enter')login()">
    <p id="loginError" style="color:#fca5a5;font-size:.82rem;display:none;margin-bottom:12px">Неверный пароль</p>
    <button class="login-btn" onclick="login()">Войти</button>
</div>

<!-- Admin Panel -->
<div id="adminPanel" class="admin-panel">
    <div class="admin-top">
        <div style="display:flex;align-items:center;gap:12px">
            <div style="width:36px;height:36px;background:linear-gradient(135deg,#B80018,#C8A000);border-radius:10px;display:flex;align-items:center;justify-content:center"><svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg></div>
            <span style="font-family:'Oswald',sans-serif;font-weight:700;font-size:1.1rem">АДМИН-ПАНЕЛЬ</span>
        </div>
        <button class="btn btn-secondary" onclick="logout()">Выйти</button>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="showSection('clients',this)">👥 Клиенты</button>
        <button class="tab" onclick="showSection('addclient',this)">➕ Новый клиент</button>
        <button class="tab" onclick="showSection('apps',this)">📋 Заявки</button>
        <button class="tab" onclick="showSection('cases',this)">📂 Дела</button>
    </div>

    <!-- Clients Section -->
    <div id="clients" class="section active">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px">
            <h2>👥 Все клиенты (<span id="clientCount">0</span>)</h2>
            <div style="display:flex;gap:8px">
                <input type="text" id="clientSearch" placeholder="Поиск..." oninput="filterAdminClients()" style="padding:8px 14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;color:#fff;font-size:.82rem;font-family:'PT Sans',sans-serif">
                <button class="btn btn-primary" onclick="showSection('addclient',document.querySelectorAll('.tab')[1])">➕ Добавить</button>
            </div>
        </div>
        <div id="clientCards"></div>
    </div>

    <!-- Client Detail Modal -->
    <div id="clientModal" style="display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);overflow-y:auto;padding:20px" onclick="if(event.target===this)closeModal()">
        <div style="max-width:600px;margin:40px auto;background:#1A1A1A;border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:28px;position:relative">
            <button onclick="closeModal()" style="position:absolute;top:16px;right:16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:6px 12px;color:#7a8ba3;cursor:pointer;font-size:.82rem">✕ Закрыть</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <!-- Add Client Section -->
    <div id="addclient" class="section">
        <h2>➕ Добавить клиента</h2>
        <div class="card">
            <form id="addClientForm">
                <div class="form-row">
                    <div class="form-group"><label class="form-label">ФИО *</label><input type="text" class="form-input" id="cName" placeholder="Иванов Иван Иванович" required></div>
                    <div class="form-group"><label class="form-label">Телефон *</label><input type="tel" class="form-input" id="cPhone" placeholder="+7 7XX XXX XX XX" required></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label class="form-label">ИИН</label><input type="text" class="form-input" id="cIin" placeholder="12 цифр"></div>
                    <div class="form-group"><label class="form-label">Город</label><input type="text" class="form-input" id="cCity" placeholder="Алматы"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Сумма потерь *</label><input type="text" class="form-input" id="cAmount" placeholder="2 500 000 ₸" required></div>
                    <div class="form-group"><label class="form-label">Платформа-мошенник</label><input type="text" class="form-input" id="cPlatform" placeholder="Название платформы"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Статус</label><select class="form-input" id="cStatus"><option value="new">Новый</option><option value="process">В работе</option><option value="done">Завершено</option></select></div>
                    <div class="form-group"><label class="form-label">Консультант</label><input type="text" class="form-input" id="cConsultant" placeholder="ФИО консультанта"></div>
                </div>
                <div class="form-group"><label class="form-label">Описание ситуации</label><textarea class="form-input" id="cDesc" rows="3" placeholder="Опишите ситуацию клиента..."></textarea></div>
                <button type="submit" class="btn btn-primary" style="padding:12px 32px;font-size:.95rem">💾 Сохранить клиента</button>
            </form>
        </div>
    </div>

    <!-- Applications Section -->
    <div id="apps" class="section">
        <h2>📋 Заявки с сайта (<span id="appCount">0</span>)</h2>
        <div style="overflow-x:auto">
            <table class="admin-table">
                <thead><tr><th>Дата</th><th>ФИО</th><th>Телефон</th><th>Тип</th><th>Сумма</th><th>Действия</th></tr></thead>
                <tbody id="appsTable"></tbody>
            </table>
        </div>
    </div>

    <!-- Cases Section -->
    <div id="cases" class="section">
        <h2>📂 Дела</h2>
        <div style="overflow-x:auto">
            <table class="admin-table">
                <thead><tr><th>ID</th><th>Клиент</th><th>Платформа</th><th>Статус</th><th>Действия</th></tr></thead>
                <tbody id="casesTable"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
function login(){
    if(document.getElementById('loginPass').value==='1304'){
        document.getElementById('loginScreen').style.display='none';
        document.getElementById('adminPanel').style.display='block';
        loadAll();
    }else{document.getElementById('loginError').style.display='block'}
}
function logout(){location.reload()}
function showSection(id,btn){
    document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active')});
    document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
    document.getElementById(id).classList.add('active');
    if(btn)btn.classList.add('active');
}
function loadAll(){loadClients();loadApps();loadCases()}
function loadClients(){
    var clients=JSON.parse(localStorage.getItem('admin_clients')||'[]');
    document.getElementById('clientCount').textContent=clients.length;
    renderClientCards(clients);
}

function renderClientCards(clients){
    var h='';
    clients.forEach(function(c){
        var sc=c.status==='done'?'badge-done':c.status==='process'?'badge-process':'badge-new';
        var sl=c.status==='done'?'Завершено':c.status==='process'?'В работе':'Новый';
        h+='<div onclick="openClientModal(\''+c.id+'\')" style="background:rgba(26,26,26,.5);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px;margin-bottom:8px;cursor:pointer;transition:all .3s;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px" onmouseover="this.style.borderColor=\'rgba(184,0,24,.3)\';this.style.transform=\'translateY(-2px)\'" onmouseout="this.style.borderColor=\'rgba(255,255,255,.06)\';this.style.transform=\'none\'">';
        h+='<div style="flex:1;min-width:200px">';
        h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><strong style="font-size:.95rem">'+c.name+'</strong><span class="badge '+sc+'" style="font-size:.65rem">'+sl+'</span></div>';
        h+='<div style="display:flex;gap:12px;font-size:.78rem;color:#7a8ba3;flex-wrap:wrap">';
        h+='<span>'+c.id+'</span>';
        if(c.phone)h+='<span>📱 '+c.phone+'</span>';
        if(c.amount)h+='<span style="color:#C8A000">💰 '+c.amount+'</span>';
        h+='</div></div>';
        h+='<div style="display:flex;gap:6px">';
        h+='<button class="btn btn-secondary" style="padding:6px 12px;font-size:.75rem" onclick="event.stopPropagation();changeStatus(\''+c.id+'\')">📊</button>';
        h+='<button class="btn btn-secondary" style="padding:6px 12px;font-size:.75rem" onclick="event.stopPropagation();addComment(\''+c.id+'\')">💬</button>';
        h+='<button class="btn btn-danger" style="padding:6px 12px;font-size:.75rem" onclick="event.stopPropagation();deleteClient(\''+c.id+'\')">🗑</button>';
        h+='</div></div>';
    });
    document.getElementById('clientCards').innerHTML=h||'<p style="text-align:center;color:#7a8ba3;padding:24px">Нет клиентов</p>';
}

function filterAdminClients(){
    var q=document.getElementById('clientSearch').value.trim().toLowerCase();
    var clients=JSON.parse(localStorage.getItem('admin_clients')||'[]');
    if(q){
        clients=clients.filter(function(c){
            return c.name.toLowerCase().indexOf(q)>=0||c.id.toLowerCase().indexOf(q)>=0||c.phone.indexOf(q)>=0;
        });
    }
    renderClientCards(clients);
}

function openClientModal(id){
    var clients=JSON.parse(localStorage.getItem('admin_clients')||'[]');
    var c=clients.find(function(x){return x.id===id});
    if(!c)return;
    var h='';
    h+='<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">';
    h+='<div style="width:48px;height:48px;background:linear-gradient(135deg,#B80018,#C8A000);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:700;color:#fff;font-family:Oswald">'+c.name.split(' ').map(function(w){return w[0]}).join('').substring(0,2)+'</div>';
    h+='<div><div style="font-family:Oswald;font-weight:700;font-size:1.2rem">'+c.name+'</div><div style="font-size:.82rem;color:#7a8ba3">'+c.id+'</div></div></div>';

    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">';
    h+='<div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:14px"><div style="font-size:.72rem;color:#7a8ba3;margin-bottom:4px">Телефон</div><div style="font-weight:700">'+c.phone+'</div></div>';
    h+='<div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:14px"><div style="font-size:.72rem;color:#7a8ba3;margin-bottom:4px">Сумма</div><div style="font-weight:700;color:#C8A000">'+c.amount+'</div></div>';
    h+='<div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:14px"><div style="font-size:.72rem;color:#7a8ba3;margin-bottom:4px">ИИН</div><div style="font-weight:700">'+(c.iin||'—')+'</div></div>';
    h+='<div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:14px"><div style="font-size:.72rem;color:#7a8ba3;margin-bottom:4px">Город</div><div style="font-weight:700">'+(c.city||'—')+'</div></div>';
    h+='<div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:14px"><div style="font-size:.72rem;color:#7a8ba3;margin-bottom:4px">Платформа</div><div style="font-weight:700">'+(c.platform||'—')+'</div></div>';
    h+='<div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:14px"><div style="font-size:.72rem;color:#7a8ba3;margin-bottom:4px">Статус</div><div style="font-weight:700">'+(c.status==='done'?'✅ Завершено':c.status==='process'?'⏳ В работе':'🆕 Новый')+'</div></div>';
    h+='</div>';

    if(c.consultant)h+='<div style="margin-bottom:16px;padding:12px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:10px"><div style="font-size:.78rem;color:#7a8ba3;margin-bottom:4px">Консультант</div><div style="font-weight:600">'+c.consultant+'</div></div>';
    if(c.desc)h+='<div style="margin-bottom:16px;padding:12px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:10px"><div style="font-size:.78rem;color:#7a8ba3;margin-bottom:4px">Описание</div><div style="font-size:.88rem;line-height:1.5">'+c.desc+'</div></div>';
    h+='<div style="font-size:.72rem;color:#555;margin-bottom:16px">Создано: '+c.date+'</div>';

    h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px">';
    h+='<button class="btn btn-primary" onclick="changeStatus(\''+c.id+'\');closeModal()" style="padding:10px;font-size:.82rem">📊 Статус</button>';
    h+='<button class="btn btn-secondary" onclick="editClient(\''+c.id+'\');closeModal()" style="padding:10px;font-size:.82rem">✏️ Редактировать</button>';
    h+='<button class="btn btn-danger" onclick="if(confirm(\'Удалить?\')){deleteClient(\''+c.id+'\');closeModal()}" style="padding:10px;font-size:.82rem">🗑 Удалить</button>';
    h+='</div>';

    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
    h+='<button class="btn btn-secondary" onclick="addComment(\''+c.id+'\');closeModal()" style="padding:10px;font-size:.82rem">💬 Комментарий</button>';
    h+='<a href="/antifraud-kz/client/dashboard.html?id='+c.id+'" target="_blank" class="btn btn-secondary" style="padding:10px;font-size:.82rem;text-align:center;text-decoration:none;color:#e8ecf4">👁 Дашборд</a>';
    h+='</div>';

    document.getElementById('modalContent').innerHTML=h;
    document.getElementById('clientModal').style.display='block';
}

function closeModal(){document.getElementById('clientModal').style.display='none';}

function changeStatus(id){
    var clients=JSON.parse(localStorage.getItem('admin_clients')||'[]');
    var c=clients.find(function(x){return x.id===id});
    if(!c)return;
    var newStatus=prompt('Статус для '+c.name+':\nnew = Новый\nprocess = В работе\ndone = Завершено',c.status);
    if(!newStatus)return;
    c.status=newStatus;
    localStorage.setItem('admin_clients',JSON.stringify(clients));
    loadClients();
}

function addComment(id){
    var clients=JSON.parse(localStorage.getItem('admin_clients')||'[]');
    var c=clients.find(function(x){return x.id===id});
    if(!c)return;
    var comment=prompt('Комментарий для '+c.name+':');
    if(!comment)return;
    c.desc=(c.desc?c.desc+'\n':'')+comment;
    localStorage.setItem('admin_clients',JSON.stringify(clients));
}

function editClient(id){
    var clients=JSON.parse(localStorage.getItem('admin_clients')||'[]');
    var c=clients.find(function(x){return x.id===id});
    if(!c)return;
    c.name=prompt('ФИО:',c.name)||c.name;
    c.phone=prompt('Телефон:',c.phone)||c.phone;
    c.amount=prompt('Сумма:',c.amount)||c.amount;
    c.city=prompt('Город:',c.city)||c.city;
    c.iin=prompt('ИИН:',c.iin)||c.iin;
    c.platform=prompt('Платформа:',c.platform)||c.platform;
    c.consultant=prompt('Консультант:',c.consultant)||c.consultant;
    c.desc=prompt('Описание:',c.desc)||c.desc;
    localStorage.setItem('admin_clients',JSON.stringify(clients));
    loadClients();
}
function loadApps(){
    var apps=JSON.parse(localStorage.getItem('applications')||'[]');
    document.getElementById('appCount').textContent=apps.length;
    var typeNames={callback:'Звонок',consult:'Консультация',docs:'Документы',return:'Возврат',check:'Проверка',other:'Другое',invest:'Инвестиции',crypto:'Крипто',forex:'Forex',mfo:'МФО',credit:'Кредит'};
    var h='';
    apps.reverse().forEach(function(a){
        h+='<tr><td style="color:#7a8ba3;font-size:.82rem">'+new Date(a.timestamp).toLocaleDateString('ru-RU')+'</td>';
        h+='<td><strong>'+(a.name||a.fio||'—')+'</strong></td>';
        h+='<td>'+(a.phone||'—')+'</td>';
        h+='<td>'+(typeNames[a.type]||a.type||'—')+'</td>';
        h+='<td>'+(a.amount||'—')+'</td>';
        h+='<td><button class="btn btn-primary" onclick="convertToClient(\''+JSON.stringify(JSON.stringify(a))+'\')">➕ В клиенты</button></td></tr>';
    });
    document.getElementById('appsTable').innerHTML=h||'<tr><td colspan="6" style="text-align:center;color:#7a8ba3;padding:24px">Нет заявок</td></tr>';
}
function loadCases(){
    var cases=JSON.parse(localStorage.getItem('cases')||'[]');
    var h='';
    cases.forEach(function(c){
        h+='<tr><td style="color:#7a8ba3;font-size:.75rem">'+c.id+'</td>';
        h+='<td><strong>'+c.client+'</strong></td>';
        h+='<td>'+c.platform+'</td>';
        h+='<td><span class="badge badge-'+c.status+'">'+{new:'Новое',process:'В работе',done:'Завершено'}[c.status]+'</span></td>';
        h+='<td><a href="/antifraud-kz/case.html?id='+c.id+'" target="_blank" class="btn btn-secondary">🔗</a></td></tr>';
    });
    document.getElementById('casesTable').innerHTML=h||'<tr><td colspan="5" style="text-align:center;color:#7a8ba3;padding:24px">Нет дел</td></tr>';
}
function convertToClient(jsonStr){
    var a=JSON.parse(JSON.parse(jsonStr));
    document.getElementById('cName').value=a.name||a.fio||'';
    document.getElementById('cPhone').value=a.phone||'';
    document.getElementById('cAmount').value=a.amount||'';
    document.getElementById('cPlatform').value=a.platform||'';
    document.getElementById('cDesc').value=a.details||a.text||'';
    showSection('addclient',document.querySelectorAll('.tab')[1]);
}
document.getElementById('addClientForm').addEventListener('submit',function(e){
    e.preventDefault();
    var clients=JSON.parse(localStorage.getItem('admin_clients')||'[]');
    var id='AF-'+new Date().getFullYear()+'-'+String(clients.length+1).padStart(4,'0');
    var client={
        id:id,
        name:document.getElementById('cName').value,
        phone:document.getElementById('cPhone').value,
        iin:document.getElementById('cIin').value,
        city:document.getElementById('cCity').value,
        amount:document.getElementById('cAmount').value,
        platform:document.getElementById('cPlatform').value,
        status:document.getElementById('cStatus').value,
        consultant:document.getElementById('cConsultant').value,
        desc:document.getElementById('cDesc').value,
        date:new Date().toLocaleDateString('ru-RU')
    };
    clients.push(client);
    localStorage.setItem('admin_clients',JSON.stringify(clients));
    this.reset();
    showSection('clients',document.querySelectorAll('.tab')[0]);
    loadClients();
    alert('Клиент добавлен! ID: '+id);
        // Send to Telegram
        var msg='👤 НОВЫЙ КЛИЕНТ\n\nID: '+id+'\nФИО: '+client.name+'\nТелефон: '+client.phone+'\nСумма: '+client.amount+'\nПлатформа: '+(client.platform||'—')+'\nСтатус: '+client.status;
        fetch('https://api.telegram.org/bot8829750295:AAEdnt-7FPCVuVbgj6tgn7eC2_2LpY5VHCk/sendMessage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:'8471070560',text:msg})}).catch(function(){});
});
function deleteClient(id){
    if(!confirm('Удалить клиента?'))return;
    var clients=JSON.parse(localStorage.getItem('admin_clients')||'[]');
    clients=clients.filter(function(c){return c.id!==id});
    localStorage.setItem('admin_clients',JSON.stringify(clients));
    loadClients();
}
</script>
