<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Кейсы — Антифрод Центр Казахстан</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{primary:"#B80018",gold:"#C8A000",dark:"#1A1A1A",darker:"#000000"},fontFamily:{heading:["Oswald","sans-serif"],body:["PT Sans","sans-serif"]}}}}</script>
<link rel="stylesheet" href="/antifraud-kz/assets/css/styles.css">
<style>
body{background:#000;color:#fff;font-family:PT Sans,sans-serif;padding-bottom:80px}
.cw{max-width:900px;margin:0 auto;padding:clamp(20px,5vw,40px) clamp(16px,4vw,16px)}
.cw h1{font-size:clamp(1.6rem,4vw,2.2rem);font-weight:700;margin-bottom:6px;text-align:center}
.cw>p{color:#7a8ba3;margin-bottom:24px;font-size:.92rem;text-align:center}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:32px}
.stat-card{background:#1A1A1A;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:16px;text-align:center}
.stat-val{font-family:Oswald,sans-serif;font-size:1.5rem;font-weight:700}
.stat-label{font-size:.75rem;color:#7a8ba3;margin-top:4px}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.filter-btn{padding:6px 14px;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:#7a8ba3;transition:all .2s;font-family:PT Sans,sans-serif}
.filter-btn.active{background:rgba(184,0,24,.1);color:#fff;border-color:rgba(184,0,24,.3)}
.case-card{background:rgba(26,26,26,0.5);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px;margin-bottom:10px;transition:all .4s cubic-bezier(0.16,1,0.3,1)}
.case-card:hover{border-color:rgba(184,0,24,.2);transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.case-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.case-badge{font-size:.72rem;padding:3px 10px;border-radius:100px;font-weight:700}
.badge-done{background:rgba(16,185,129,.1);color:#6ee7b7;border:1px solid rgba(16,185,129,.2)}
.badge-process{background:rgba(245,158,11,.1);color:#fbbf24;border:1px solid rgba(245,158,11,.2)}
.case-date{font-size:.72rem;color:#7a8ba3}
.case-name{font-weight:700;font-size:.92rem}
.case-prof{font-size:.72rem;color:#7a8ba3}
.case-desc{font-size:.82rem;color:#e8ecf4;line-height:1.5;margin:8px 0}
.case-platform{font-size:.75rem;color:#C8A000;margin-bottom:8px}
.case-result{font-family:Oswald,sans-serif;font-weight:700;font-size:1rem}
.result-ok{color:#6ee7b7}
.result-pending{color:#fbbf24}
.load-more{display:block;width:100%;padding:14px;margin-top:16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;color:#7a8ba3;font-weight:700;font-size:.92rem;cursor:pointer;text-align:center;transition:all .2s;font-family:PT Sans,sans-serif}
.load-more:hover{background:rgba(184,0,24,.1);color:#fff;border-color:rgba(184,0,24,.3)}
</style>
</head>
<body>
<div class="cw" style="padding-top:100px">
<h1 data-reveal>✨ Кейсы клиентов</h1>
<p data-reveal>Анонимизированные дела о возврате средств</p>
<div class="stats">
<div class="stat-card"><div class="stat-val" style="color:#B80018">847</div><div class="stat-label">Возвратов</div></div>
<div class="stat-card"><div class="stat-val" style="color:#C8A000">87%</div><div class="stat-label">Без суда</div></div>
<div class="stat-card"><div class="stat-val" style="color:#B80018">316 млрд</div><div class="stat-label">₸ возвращено</div></div>
<div class="stat-card"><div class="stat-val" style="color:#C8A000">12+</div><div class="stat-label">Юрисдикций</div></div>
</div>
<div class="filter-row">
<button class="filter-btn active btn-ripple" onclick="filterCases('all',this)">Все</button>
<button class="filter-btn btn-ripple" onclick="filterCases('done',this)">✓ Возврат</button>
<button class="filter-btn btn-ripple" onclick="filterCases('process',this)">⏳ В работе</button>
</div>
<div id="casesList" data-stagger data-stagger-delay="40"></div>
<div id="loadMoreWrap"><button class="load-more" id="loadMoreBtn" onclick="showMore()">Показать ещё</button></div>
<div style="text-align:center;margin-top:40px;padding:32px;background:#1A1A1A;border:1px solid rgba(255,255,255,.06);border-radius:16px">
<p style="color:#7a8ba3;margin-bottom:16px">Начните процесс возврата</p>
<a href="/antifraud-kz/quiz.html" style="display:inline-flex;align-items:center;gap:10px;padding:14px 28px;background:linear-gradient(135deg,#B80018,#8B0012);color:#fff;border-radius:12px;font-weight:700;text-decoration:none;transition:all .2s">ОСТАВИТЬ ЗАЯВКУ →</a>
</div>
</div>
<script>
var fn=['Клиент Л','Клиент П','Клиент А','Клиент Б','Клиент Д','Клиент В','Клиент Ж','Клиент Г','Клиент М','Клиент Н','Клиент О','Клиент З','Клиент И','Клиент К','Клиент Е','Клиент Р'];
var ages=['65','66','67','68','69','70','71','72','73','74','75'];
var profs=['Врач','Бухгалтер','Учитель','Менеджер','Инженер','Предприниматель','Пенсионер','Пенсионерка','Юрист'];
var cities=['Алматы','Астана','Шымкент','Атырау','Караганда','Актобе','Павлодар','Костанай','Семей','Петропавловск','Усть-Каменогорск','Тараз'];
var platforms=['FinHub Invest','InvestPro Capital','TradePro KZ','Atlas Broker','Binomo клон','IQ Option клон','PrimeFX Markets','GlobalTrade FX','CryptoGain KZ','TradeWave FX','AlphaTrade KZ','SmartInvest Pro'];
var amounts=['150 000 ₸','320 000 ₸','500 000 ₸','780 000 ₸','1.2 млн ₸','1.8 млн ₸','2.5 млн ₸','3.1 млн ₸','4.5 млн ₸','5.0 млн ₸','$4 100','$12 400','$28 500','$45 000','$82 000'];
var methods=['Жалоба в АРРФР','Чарджбэк','Суд','Заявление в полицию','Международное'];
var statuses=['done','done','done','done','done','done','done','done','process','process'];
var months=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
var years=['2025','2026'];

var SEED=42;
function rand(){SEED=(SEED*16807)%2147483647;return(SEED-1)/2147483646;}
function pick(arr){return arr[Math.floor(rand()*arr.length)];}

var ALL_CASES=[];
for(var i=0;i<847;i++){
    var status=pick(statuses);
    var method=pick(methods);
    var platform=pick(platforms);
    ALL_CASES.push({
        name:pick(fn)+' '+pick(ages)+' лет · '+pick(cities),
        prof:pick(profs),
        platform:platform,
        amount:pick(amounts),
        status:status,
        method:method,
        result:status==='done'?'✓ Полный возврат':'⏳ В работе',
        date:pick(months)+' '+pick(years),
        desc:'Мошенничество через '+platform+'. '+method+'.'
    });
}

var PAGE=0;
var PER_PAGE=30;
var currentFilter='all';

function getFiltered(){
    if(currentFilter==='all')return ALL_CASES;
    return ALL_CASES.filter(function(c){return c.status===currentFilter});
}

function renderCases(list,append){
    var h='';
    list.forEach(function(c){
        var bc=c.status==="done"?"badge-done":"badge-process";
        var br=c.status==="done"?"result-ok":"result-pending";
        h+='<div class="case-card">';
        h+='<div class="case-head"><span class="case-badge '+bc+'">'+c.result+'</span><span class="case-date">'+c.date+'</span></div>';
        h+='<div class="case-name">'+c.name+'</div><div class="case-prof">'+c.prof+'</div>';
        h+='<div class="case-platform">Платформа: '+c.platform+' · Метод: '+c.method+'</div>';
        h+='<div class="case-desc">'+c.desc+'</div>';
        h+='<div class="case-result '+br+'">'+c.amount+'</div></div>';
    });
    if(append){
        document.getElementById('casesList').insertAdjacentHTML('beforeend',h);
    }else{
        document.getElementById('casesList').innerHTML=h;
    }
}

function showMore(){
    PAGE++;
    var filtered=getFiltered();
    var start=PAGE*PER_PAGE;
    var slice=filtered.slice(start,start+PER_PAGE);
    renderCases(slice,true);
    if(start+PER_PAGE>=filtered.length){
        document.getElementById('loadMoreWrap').innerHTML='<p style="text-align:center;color:#7a8ba3;font-size:.82rem;padding:16px">Показаны все '+filtered.length+' кейсов</p>';
    }
}

function filterCases(q,btn){
    document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active')});
    btn.classList.add('active');
    currentFilter=q;
    PAGE=0;
    var filtered=getFiltered();
    renderCases(filtered.slice(0,PER_PAGE),false);
    if(filtered.length>PER_PAGE){
        document.getElementById('loadMoreWrap').innerHTML='<button class="load-more" id="loadMoreBtn" onclick="showMore()">Показать ещё (из '+filtered.length+')</button>';
    }else{
        document.getElementById('loadMoreWrap').innerHTML='';
    }
}

renderCases(ALL_CASES.slice(0,PER_PAGE),false);
</script>
<script src="/antifraud-kz/assets/js/effects.js"></script>
<script src="/antifraud-kz/assets/js/nav.js"></script>
</body>
</html>
